<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FWC26 Dallas Main Logistics Center — Activity Forecast</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,300&family=Space+Mono:wght@400;700&display=swap');
  :root{--bg:#030711;--sf:#080d18;--sf2:#0c1322;--sfh:#141e36;--bd:#111a2c;--bda:#1e3050;--tx:#e4eaf4;--td:#94a3bb;--tm:#4e5d74;--ip:#38bdf8;--ip2:#0ea5e9;--ig:#38bdf818;--ig2:#38bdf808;--op:#fb923c;--op2:#f97316;--og:#fb923c18;--og2:#fb923c08;--gn:#34d399;--kb:rgba(255,255,255,0.015);
    --fs-xs:clamp(6px,.35vw,9px);--fs-sm:clamp(7px,.45vw,11px);--fs-md:clamp(9px,.55vw,13px);--fs-lg:clamp(11px,.7vw,16px);--fs-kpi:clamp(16px,1.3vw,30px);
    --sp-xs:clamp(1px,.08vw,2px);--sp-sm:clamp(2px,.15vw,4px);--sp-md:clamp(3px,.22vw,6px);--sp-lg:clamp(5px,.35vw,9px);
    --glow-in:0 0 30px rgba(56,189,248,.06);--glow-out:0 0 30px rgba(251,146,60,.06)}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);overflow:hidden;height:100vh;width:100vw}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 25% 50%,rgba(56,189,248,.02) 0%,transparent 60%),radial-gradient(ellipse 80% 50% at 75% 50%,rgba(251,146,60,.02) 0%,transparent 60%);pointer-events:none;z-index:0}
  body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px);pointer-events:none;z-index:9999}

  .topbar{display:flex;justify-content:space-between;align-items:center;padding:0 1.2vw;background:linear-gradient(180deg,rgba(12,18,32,.95) 0%,rgba(6,10,20,.98) 100%);border-bottom:1px solid var(--bd);height:clamp(24px,2.2vh,36px);flex-shrink:0;position:relative;z-index:1}
  .topbar::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:1px;background:linear-gradient(90deg,rgba(56,189,248,.2) 0%,rgba(56,189,248,.05) 25%,transparent 50%,rgba(251,146,60,.05) 75%,rgba(251,146,60,.2) 100%)}
  .topbar-left{display:flex;align-items:center;gap:var(--sp-lg)}
  .topbar-logo{font-family:'Space Mono',monospace;font-weight:700;font-size:var(--fs-lg);color:var(--ip);letter-spacing:-0.5px;text-shadow:0 0 16px rgba(56,189,248,.35),0 0 40px rgba(56,189,248,.1)}
  .topbar-title{font-size:var(--fs-sm);color:var(--td);font-weight:300;opacity:.8}
  .topbar-right{display:flex;align-items:center;gap:var(--sp-lg);font-family:'Space Mono',monospace;font-size:var(--fs-sm);color:var(--tm)}
  .dot{width:clamp(5px,.3vw,8px);height:clamp(5px,.3vw,8px);border-radius:50%;background:var(--gn);display:inline-block;animation:p 2.5s ease-in-out infinite;box-shadow:0 0 6px rgba(52,211,153,.6),0 0 16px rgba(52,211,153,.2)}
  @keyframes p{0%,100%{opacity:1;box-shadow:0 0 6px rgba(52,211,153,.6),0 0 16px rgba(52,211,153,.2)}50%{opacity:.4;box-shadow:0 0 3px rgba(52,211,153,.3)}}

  .main{display:flex;height:calc(100vh - clamp(24px,2.2vh,36px));position:relative;z-index:1}
  .panel{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
  .panel-in{position:relative}
  .panel-in::after{content:'';position:absolute;right:0;top:0;bottom:0;width:1px;background:linear-gradient(180deg,rgba(56,189,248,.25) 0%,var(--bd) 20%,var(--bd) 80%,rgba(251,146,60,.25) 100%);z-index:2}
  .ph{padding:var(--sp-sm) var(--sp-md) var(--sp-xs);flex-shrink:0}
  .pl{font-family:'Space Mono',monospace;font-size:var(--fs-xs);font-weight:700;text-transform:uppercase;letter-spacing:2px;display:flex;align-items:center;gap:var(--sp-sm)}
  .panel-in .pl{color:var(--ip)}.panel-out .pl{color:var(--op)}
  .pl-line{flex:1;height:1px;background:linear-gradient(90deg,var(--bd) 0%,transparent 100%)}

  .ks{display:flex;gap:var(--sp-xs);padding:var(--sp-xs) var(--sp-md) var(--sp-sm);flex-shrink:0}
  .kc{flex:1;background:linear-gradient(180deg,rgba(255,255,255,.018) 0%,rgba(255,255,255,.005) 100%);border:1px solid var(--bd);border-radius:4px;padding:var(--sp-sm) var(--sp-sm);position:relative;overflow:hidden}
  .panel-in .kc{border-bottom-color:rgba(56,189,248,.12);box-shadow:var(--glow-in)}
  .panel-out .kc{border-bottom-color:rgba(251,146,60,.12);box-shadow:var(--glow-out)}
  .kc::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent)}
  .kv{font-family:'Space Mono',monospace;font-size:var(--fs-kpi);font-weight:700;line-height:1}
  .panel-in .kv{color:var(--ip);text-shadow:0 0 24px rgba(56,189,248,.25),0 1px 0 rgba(0,0,0,.5)}.panel-out .kv{color:var(--op);text-shadow:0 0 24px rgba(251,146,60,.25),0 1px 0 rgba(0,0,0,.5)}
  .kl{font-size:var(--fs-xs);color:var(--tm);text-transform:uppercase;letter-spacing:.8px;font-weight:500;margin-top:1px}

  .dc{display:flex;flex:1;overflow:hidden;padding:0 var(--sp-sm) var(--sp-sm);gap:var(--sp-sm)}
  .dy{display:flex;flex-direction:column;border-radius:5px;overflow:hidden;border:1px solid var(--bd);background:linear-gradient(180deg,var(--sf) 0%,rgba(6,10,20,.6) 100%);min-width:0;box-shadow:0 2px 8px rgba(0,0,0,.2)}
  .dy-act{flex:3}.dy-emp{flex:1;min-width:40px;opacity:.4}.dy-up{flex:2}
  .dh{padding:var(--sp-sm) var(--sp-sm);border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;background:linear-gradient(180deg,rgba(255,255,255,.012) 0%,transparent 100%)}
  .dn{font-weight:700;font-size:var(--fs-md);letter-spacing:.2px}
  .dd{font-family:'Space Mono',monospace;font-size:var(--fs-xs);color:var(--tm)}
  .dy-today{border-color:rgba(56,189,248,.18);box-shadow:0 0 20px rgba(56,189,248,.04),0 2px 8px rgba(0,0,0,.2)}
  .dy-today .dh{background:linear-gradient(180deg,rgba(56,189,248,.07) 0%,rgba(56,189,248,.01) 100%)}
  .dy-today .dn{color:var(--ip)}
  .panel-out .dy-today{border-color:rgba(251,146,60,.18);box-shadow:0 0 20px rgba(251,146,60,.04),0 2px 8px rgba(0,0,0,.2)}
  .panel-out .dy-today .dh{background:linear-gradient(180deg,rgba(251,146,60,.07) 0%,rgba(251,146,60,.01) 100%)}
  .panel-out .dy-today .dn{color:var(--op)}
  .db{font-family:'Space Mono',monospace;font-size:var(--fs-xs);padding:1px var(--sp-sm);border-radius:10px;font-weight:700;white-space:nowrap}
  .panel-in .db{background:rgba(56,189,248,.1);color:var(--ip);border:1px solid rgba(56,189,248,.15)}
  .panel-out .db{background:rgba(251,146,60,.1);color:var(--op);border:1px solid rgba(251,146,60,.15)}

  .dcc{flex:1;overflow-y:auto;padding:var(--sp-sm);display:flex;flex-direction:column;gap:var(--sp-sm)}
  .dcc::-webkit-scrollbar{width:2px}.dcc::-webkit-scrollbar-track{background:transparent}.dcc::-webkit-scrollbar-thumb{background:var(--bda);border-radius:1px}
  .emp{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;color:var(--tm);font-size:var(--fs-sm);gap:var(--sp-xs);opacity:.3}

  .cd{background:linear-gradient(180deg,rgba(255,255,255,.015) 0%,rgba(255,255,255,.003) 100%);border:1px solid var(--bd);border-left:2px solid var(--bd);border-radius:4px;padding:var(--sp-sm) var(--sp-sm);cursor:pointer;transition:all .15s ease;position:relative}
  .panel-in .cd{border-left-color:rgba(56,189,248,.18)}
  .panel-out .cd{border-left-color:rgba(251,146,60,.18)}
  .cd:hover{background:linear-gradient(180deg,rgba(255,255,255,.03) 0%,rgba(255,255,255,.01) 100%);border-color:var(--bda);transform:translateY(-1px)}
  .panel-in .cd:hover{border-left-color:var(--ip);box-shadow:0 4px 16px rgba(56,189,248,.08),inset 0 0 0 1px rgba(56,189,248,.05)}
  .panel-out .cd:hover{border-left-color:var(--op);box-shadow:0 4px 16px rgba(251,146,60,.08),inset 0 0 0 1px rgba(251,146,60,.05)}
  .ct{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:2px}
  .cv{font-weight:700;font-size:var(--fs-sm);line-height:1.15;max-width:72%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:.1px}
  .cb{font-family:'Space Mono',monospace;font-size:var(--fs-xs);padding:1px var(--sp-sm);border-radius:2px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;flex-shrink:0}
  .b-ffe{background:rgba(96,165,250,.08);color:#7db4fc;border:1px solid rgba(96,165,250,.15)}.b-cort{background:rgba(192,132,252,.08);color:#cda0fc;border:1px solid rgba(192,132,252,.15)}.b-frt{background:rgba(74,222,128,.08);color:#6ee7a0;border:1px solid rgba(74,222,128,.15)}.b-trk{background:rgba(251,191,36,.08);color:#fcd050;border:1px solid rgba(251,191,36,.15)}.b-dsp{background:rgba(249,115,22,.08);color:#fb923c;border:1px solid rgba(249,115,22,.15)}.b-man{background:rgba(232,121,249,.08);color:#f0a0fc;border:1px solid rgba(232,121,249,.15)}.b-oth{background:rgba(148,163,184,.06);color:#a0b0c4;border:1px solid rgba(148,163,184,.1)}
  .cm{display:flex;gap:var(--sp-sm);font-size:var(--fs-xs);color:var(--tm);margin-bottom:1px}
  .cm span{display:flex;align-items:center;gap:2px}.cm .n{font-family:'Space Mono',monospace;color:var(--td);font-weight:700}
  .cve{font-size:var(--fs-xs);color:var(--td);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:1px}
  .cs{border-top:1px solid rgba(255,255,255,.035);margin-top:var(--sp-xs);padding-top:2px}
  .csl{display:flex;justify-content:space-between;font-size:var(--fs-xs);padding:0;line-height:1.4}
  .csn{color:var(--td);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:68%;opacity:.85}
  .csq{font-family:'Space Mono',monospace;font-size:var(--fs-xs);color:var(--tm);font-weight:700}
  .csm{font-size:var(--fs-xs);color:var(--tm);font-style:italic;margin-top:0;opacity:.6}

  .mo{display:none;position:fixed;inset:0;background:rgba(3,7,17,.85);backdrop-filter:blur(12px);z-index:1000;align-items:center;justify-content:center}
  .mo.active{display:flex}
  .md{background:linear-gradient(180deg,#0c1322 0%,#080d18 100%);border:1px solid var(--bda);border-radius:10px;width:90%;max-width:700px;max-height:80vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 32px 100px rgba(0,0,0,.8),0 0 1px rgba(56,189,248,.15),0 0 60px rgba(56,189,248,.03)}
  .mdh{padding:18px 22px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center;background:linear-gradient(180deg,rgba(255,255,255,.01) 0%,transparent 100%)}
  .mdh h2{font-size:var(--fs-lg);font-weight:700}
  .mx{background:none;border:1px solid var(--bd);color:var(--td);width:34px;height:34px;border-radius:6px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .12s}
  .mx:hover{background:var(--sfh);color:var(--tx);border-color:var(--bda)}
  .mdb{padding:18px 22px;overflow-y:auto;flex:1}
  .mkr{display:flex;gap:10px;margin-bottom:16px}
  .mk{flex:1;background:linear-gradient(180deg,rgba(255,255,255,.015) 0%,transparent 100%);border:1px solid var(--bd);border-radius:6px;padding:10px 12px;text-align:center}
  .mk .n{font-family:'Space Mono',monospace;font-size:var(--fs-lg);font-weight:700;color:var(--ip);text-shadow:0 0 16px rgba(56,189,248,.2)}
  .mk .l{font-size:var(--fs-xs);color:var(--tm);text-transform:uppercase;letter-spacing:.5px}
  .mt{width:100%;border-collapse:collapse;font-size:var(--fs-sm)}
  .mt th{text-align:left;padding:8px 10px;font-size:var(--fs-xs);text-transform:uppercase;letter-spacing:1px;color:var(--tm);border-bottom:1px solid var(--bd);font-weight:500}
  .mt td{padding:6px 10px;border-bottom:1px solid rgba(255,255,255,.03);color:var(--td)}
  .mt tr:last-child td{border-bottom:none}
  .mt .tn{color:var(--tx);font-weight:500;max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .mt .tq{font-family:'Space Mono',monospace;font-weight:700;text-align:right}

  .ls{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:2000;gap:16px;transition:opacity .5s ease}
  .ls.hide{opacity:0;pointer-events:none}
  .lsp{width:32px;height:32px;border:2px solid var(--bd);border-top-color:var(--ip);border-radius:50%;animation:sp .8s linear infinite;box-shadow:0 0 20px rgba(56,189,248,.15)}
  @keyframes sp{to{transform:rotate(360deg)}}
  .lt{font-family:'Space Mono',monospace;font-size:var(--fs-sm);color:var(--tm);text-align:center;max-width:400px}
  .dbt{position:fixed;bottom:8px;right:8px;z-index:900;background:var(--sf);border:1px solid var(--bd);color:var(--tm);font-family:'Space Mono',monospace;font-size:9px;padding:3px 8px;border-radius:3px;cursor:pointer;opacity:.15}
  .dbt:hover{opacity:.8}
  .dbp{display:none;position:fixed;bottom:34px;right:8px;width:550px;max-height:50vh;background:var(--sf);border:1px solid var(--bda);border-radius:6px;z-index:900;overflow:auto;padding:12px;font-family:'Space Mono',monospace;font-size:10px;color:var(--td);white-space:pre-wrap;word-break:break-all}
  .dbp.active{display:block}
</style>
</head>
<body>
<!-- PASSWORD GATE -->
<div id="gate" style="position:fixed;inset:0;background:var(--bg);z-index:3000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px">
  <div style="font-family:'Space Mono',monospace;font-size:clamp(14px,1.2vw,22px);color:var(--ip);font-weight:700;text-shadow:0 0 20px rgba(56,189,248,.3),0 0 60px rgba(56,189,248,.08);letter-spacing:1px">FWC26 Activity Forecast</div>
  <div style="font-size:var(--fs-sm);color:var(--tm);letter-spacing:.5px">Enter password to continue</div>
  <input id="gp" type="password" placeholder="Password" autofocus
    style="font-family:'DM Sans',sans-serif;font-size:var(--fs-md);padding:10px 16px;border-radius:6px;border:1px solid var(--bd);background:rgba(255,255,255,.02);color:var(--tx);outline:none;width:240px;text-align:center;transition:border-color .2s"
    onfocus="this.style.borderColor='rgba(56,189,248,.3)';this.style.boxShadow='0 0 16px rgba(56,189,248,.08)'"
    onblur="this.style.borderColor='var(--bd)';this.style.boxShadow='none'"
    onkeydown="if(event.key==='Enter')chkPw()">
  <button onclick="chkPw()"
    style="font-family:'Space Mono',monospace;font-size:var(--fs-sm);padding:8px 28px;border-radius:5px;border:1px solid rgba(56,189,248,.3);background:linear-gradient(180deg,rgba(56,189,248,.15) 0%,rgba(56,189,248,.05) 100%);color:var(--ip);font-weight:700;cursor:pointer;letter-spacing:.5px;transition:all .15s"
    onmouseover="this.style.background='linear-gradient(180deg,rgba(56,189,248,.25) 0%,rgba(56,189,248,.1) 100%)';this.style.boxShadow='0 0 20px rgba(56,189,248,.12)'"
    onmouseout="this.style.background='linear-gradient(180deg,rgba(56,189,248,.15) 0%,rgba(56,189,248,.05) 100%)';this.style.boxShadow='none'">ENTER</button>
  <div id="ge" style="font-size:var(--fs-xs);color:#f87171;display:none;text-shadow:0 0 8px rgba(248,113,113,.2)">Incorrect password</div>
</div>

<div class="ls" id="ls" style="display:none"><div class="lsp"></div><div class="lt">Connecting to Supabase...</div></div>
<div id="app" style="display:none">
<div class="topbar">
  <div class="topbar-left"><div class="topbar-logo">FWC26</div><div class="topbar-title">Dallas Main Logistics Center — Activity Forecast</div></div>
  <div class="topbar-right"><span><span class="dot"></span> LIVE</span><span id="rt">5:00</span><span id="ck"></span></div>
</div>
<div class="main">
  <div class="panel panel-in">
    <div class="ph"><div class="pl">▼ Inbound<span class="pl-line"></span></div></div>
    <div class="ks" id="ik"></div>
    <div class="dc" id="id"></div>
  </div>
  <div class="panel panel-out">
    <div class="ph"><div class="pl">▲ Outbound<span class="pl-line"></span></div></div>
    <div class="ks" id="ok"></div>
    <div class="dc" id="od"></div>
  </div>
</div>
</div>
<div class="mo" id="mo" onclick="clM(event)"><div class="md" onclick="event.stopPropagation()"><div class="mdh"><h2 id="mt">Details</h2><button class="mx" onclick="clM()">×</button></div><div class="mdb" id="mb"></div></div></div>
<button class="dbt" onclick="document.getElementById('dp').classList.toggle('active')">DBG</button>
<div class="dbp" id="dp"></div>

<script>
const SU='https://stwopndhnxcjyomkufii.supabase.co',SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN0d29wbmRobnhjanlvbWt1ZmlpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5MDgyNjgsImV4cCI6MjA4ODQ4NDI2OH0.YNhp7z5kxnzpX15Vw8NVVWaZG1-Lj3Q9uaZDiKmBvf8';
const RS=300,TBL='shared_state',RU=`${SU}/rest/v1/${TBL}?select=*`,HD={'apikey':SK,'Authorization':`Bearer ${SK}`,'Accept':'application/json'};
const VM={'MEX CDMX / RGS':'Mexico City','MEX CDMX/RGS':'Mexico City','CDMX / RGS':'Mexico City','CDMX/RGS':'Mexico City','CAN TOR / RGS':'Toronto','CAN TOR/RGS':'Toronto','TOR / RGS':'Toronto','TOR/RGS':'Toronto','MEX GDL / RGS':'Guadalajara','MEX GDL/RGS':'Guadalajara','GDL / RGS':'Guadalajara','GDL/RGS':'Guadalajara'};

let AD={},rc=RS,dl='';

// ── PASSWORD GATE ──
function chkPw(){
  const inp=document.getElementById('gp').value;
  if(inp==='viewme'){
    sessionStorage.setItem('fwc26_auth','1');
    document.getElementById('gate').style.display='none';
    document.getElementById('app').style.display='block';
    document.getElementById('ls').style.display='flex';
    init();
  } else {
    document.getElementById('ge').style.display='block';
    document.getElementById('gp').value='';
    document.getElementById('gp').focus();
  }
}
function lg(m){const t=new Date().toLocaleTimeString();dl+=`[${t}] ${m}\n`;const e=document.getElementById('dp');if(e)e.textContent=dl;console.log(m);}
function R(n){const v=Math.round(n*10)/10;return v%1===0?v.toFixed(0):v.toFixed(1);}
function Ri(n){return Math.round(n);}
function esc(s){if(!s)return'';const e=document.createElement('span');e.textContent=String(s);return e.innerHTML;}

async function init(){
  const lt=document.querySelector('.lt');
  try{lt.textContent='Fetching data...';await fa();document.getElementById('ls').classList.add('hide');
    setInterval(()=>{rc--;const m=Math.floor(rc/60),s=rc%60;document.getElementById('rt').textContent=`${m}:${String(s).padStart(2,'0')}`;if(rc<=0){rc=RS;fa();}},1000);
    const ck=()=>{document.getElementById('ck').textContent=new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'});};ck();setInterval(ck,1000);
  }catch(e){lg('ERR:'+e.message);lt.textContent='Error: '+e.message;lt.style.color='#f87171';setTimeout(init,5000);}
}

async function fa(){
  const res=await fetch(RU,{headers:HD});if(!res.ok){lg(`ERR ${res.status}`);return;}
  const data=await res.json();AD={};
  data.forEach(r=>{const k=r.key||r.id;let v=r.value||r.data||r.state;if(typeof v==='string'){try{v=JSON.parse(v)}catch(e){}}AD[k]=v;});
  lg(`${data.length} rows`);go();
}

function t0(){const t=new Date();t.setHours(0,0,0,0);return t;}
function aD(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function fk(d){return d.toISOString().split('T')[0];}
function fd(d){return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});}
function dn(d){return['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()];}
function dL(d){const t=t0(),df=Math.round((d-t)/864e5);return df===0?'Today':df===1?'Tomorrow':['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][d.getDay()];}
function sd(ds,tgt){if(!ds)return!1;const tk=fk(tgt),n=String(ds).includes('T')?String(ds).split('T')[0]:String(ds);if(n===tk)return!0;try{return fk(new Date(ds))===tk}catch(e){return!1}}

function go(){
  let iI=[],oI=[];
  
  // Extract LSR map from lp-truck-state → {truckId: "LSR625-001", ...}
  let lsrMap = {};
  const truckState = AD['lp-truck-state'];
  if(truckState && truckState.lsrNumbers){
    lsrMap = truckState.lsrNumbers;
    lg(`LSR map: ${JSON.stringify(lsrMap).substring(0,400)}`);
  }
  lg(`All DB keys: ${Object.keys(AD).join(', ')}`);
  
  // Keys to skip (config only, not plan or arrivals data)
  const SKIP = new Set(['lp-config','lp-nom','lp-demand','lp-truck-state']);
  
  // Debug: log structure of key data sources
  ['lp-plan','lp-arrivals','fm-rw','fm-nom'].forEach(k => {
    const v = AD[k];
    if(!v) { lg(`  KEY "${k}": not found`); return; }
    if(Array.isArray(v)) {
      lg(`  KEY "${k}": array[${v.length}] sample=${JSON.stringify(v[0]).substring(0,300)}`);
    } else if(typeof v === 'object') {
      lg(`  KEY "${k}": object keys=[${Object.keys(v).slice(0,10).join(',')}] sample=${JSON.stringify(v).substring(0,300)}`);
    } else {
      lg(`  KEY "${k}": ${typeof v} = ${String(v).substring(0,200)}`);
    }
  });
  
  Object.keys(AD).forEach(k=>{
    if(SKIP.has(k)) return;
    const v=AD[k],kl=k.toLowerCase();
    
    // LP plan + arrivals data
    if(k==='lp-plan'||k==='lp-arrivals'||(kl.includes('lp')&&!kl.includes('truck')&&!kl.includes('config')&&!kl.includes('nom')&&!kl.includes('demand'))){
      const items = ex(v,k,'LP');
      lg(`  Extracted ${items.length} items from "${k}"`);
      items.forEach(i=>{
        if(!i.lsr && i.truckId && lsrMap[i.truckId]) i.lsr = lsrMap[i.truckId];
        if(!i.lsr && i.truckId && lsrMap[String(i.truckId)]) i.lsr = lsrMap[String(i.truckId)];
        (i.direction==='outbound'?oI:iI).push(i);
      });
    }
    // FM-RW: LM material plan rows (contains inbound arrivals with dates)
    else if(k==='fm-rw'){
      const items = ex(v,k,'LP');
      lg(`  Extracted ${items.length} items from "fm-rw" (LM data)`);
      items.forEach(i=>{ iI.push(i); }); // fm-rw rows are all inbound arrivals
    }
    // LM dispatch/mile data
    else if((kl.includes('lm')||kl.includes('last mile')||kl.includes('dispatch'))&&!kl.includes('lp')&&k!=='fm-rw'){
      ex(v,k,'LM').forEach(i=>{i.direction='outbound';oI.push(i);});
    }
    // Manual items
    else if(kl.includes('manual')){
      ex(v,k,'MANUAL').forEach(i=>{(i.direction==='outbound'?oI:iI).push(i);});
    }
    // Vision
    else if(kl.includes('v26')||kl.includes('vision')){
      ex(v,k,'V26').forEach(i=>{(i.direction==='outbound'?oI:iI).push(i);});
    }
  });
  
  lg(`${iI.length} in, ${oI.length} out`);
  oI.slice(0,3).forEach(i=>{
    const rawKeys=Object.keys(i._raw||{});
    const lsrFields=rawKeys.filter(k=>k.toUpperCase().includes('LSR'));
    lg(`  OUT: "${i.itemName}" lsr=${i.lsr} venue=${i.venue} rawKeys=[${rawKeys.join(',')}] lsrFields=[${lsrFields.map(k=>k+'='+i._raw[k]).join(',')}]`);
  });

  const td=t0();

  // Helper: find next N active dates from a start offset, noting skipped days
  function findActive(items, count) {
    const slots = [];
    let offset = 0;
    let skippedCount = 0;
    let skippedFirst = null, skippedLast = null;
    while (slots.length < count && offset <= 30) {
      const d = aD(td, offset);
      const dayItems = items.filter(i => sd(i.date, d));
      if (dayItems.length > 0) {
        // Build concise skipped summary
        let skippedNote = null;
        if (skippedCount > 0) {
          if (skippedCount <= 3) {
            // List them: "Today, Tomorrow, Saturday"
            const names = [];
            for (let s = offset - skippedCount; s < offset; s++) names.push(dL(aD(td, s)));
            skippedNote = names.join(', ') + ' — no activity';
          } else {
            // Range: "Mar 12 – Mar 15 — no activity (4 days)"
            skippedNote = `${fd(skippedFirst)} – ${fd(skippedLast)} — no activity`;
          }
        }
        slots.push({ date: d, items: dayItems, sh: offset >= 3, skippedNote });
        skippedCount = 0; skippedFirst = null; skippedLast = null;
      } else {
        if (!skippedFirst) skippedFirst = aD(td, offset);
        skippedLast = aD(td, offset);
        skippedCount++;
      }
      offset++;
    }
    // Pad remaining slots with empty "no upcoming" cards
    while (slots.length < count) {
      const d = aD(td, offset);
      slots.push({ date: d, items: [], sh: true, skippedNote: skippedCount > 0 ? 'No activity in next 30 days' : null });
      offset++;
    }
    return slots;
  }

  const iB = findActive(iI, 4);
  const oB = findActive(oI, 4);

  rP('in',iB);rP('out',oB);rK('in',iB);rK('out',oB);
}

function ex(v,sk,src){const it=[];if(!v)return it;if(Array.isArray(v)){v.forEach((e,i)=>{const r=pr(e,sk,src,i);if(r)it.push(r)});return it;}
  if(typeof v==='object'){for(const a of['rows','items','trucks','deliveries','data','entries','loads','shipments']){if(Array.isArray(v[a])){v[a].forEach((e,i)=>{const r=pr(e,sk,src,i);if(r)it.push(r)});return it;}}
  Object.keys(v).forEach(k=>{const s=v[k];if(Array.isArray(s))s.forEach((e,i)=>{const r=pr(e,sk,src,i);if(r)it.push(r)});else if(typeof s==='object'&&s){const r=pr(s,sk,src,k);if(r)it.push(r)}});}return it;}

function pr(e,sk,src,idx){
  if(!e||typeof e!=='object')return null;
  const fv=cs=>{for(const c of cs)for(const k of Object.keys(e))if(k.toLowerCase().includes(c.toLowerCase()))return e[k];return null};
  const date=fv(['date','arrival','delivery','dispatch','ship','eta','scheduled'])||fv(['day','when']);
  const vendor=fv(['vendor','supplier','carrier','company','from','shipper']);
  const iN=fv(['name','sku','item','material','product','nomenclature','nom']);
  const vR=fv(['venue','destination','site','location','cluster','to','dest']);
  const plt=fv(['pallet','plt']),pcs=fv(['piece','pcs','qty','quantity','units','count']);
  const tid=fv(['truck','truckId','fp','fingerprint']),tp=fv(['type','category','kind','mode']),dir=fv(['direction','flow','dir']);
  let lsr=null;
  for(const k of Object.keys(e)){if(k.toUpperCase()==='LSR'&&e[k]){lsr=e[k];break;}}
  if(!lsr)for(const k of Object.keys(e)){if(k.toLowerCase().includes('lsr')&&e[k]){lsr=e[k];break;}}
  if(!lsr)for(const k of Object.keys(e)){const v=String(e[k]||'');if(/^LSR[\d\-]+/i.test(v)){lsr=v;break;}}
  const cR=fv(['container','shipment','booking','bol','bl','consignment'])||fv(['group','batch','load']);
  const lN=fv(['local','localDelivery','local_name','localName','delivery_name','deliveryName','po','order']);
  const isSC=cR&&/^[A-Z]{3,4}[UJZ]?\d{6,7}$/i.test(String(cR).trim());
  const cont=isSC?String(cR):(lN?String(lN):(cR?String(cR):null));
  const venue=vR?(VM[String(vR).trim()]||String(vR)):null;
  let d2='inbound';
  if(dir)d2=String(dir).toLowerCase().includes('out')?'outbound':'inbound';
  else if(src==='LM')d2='outbound';
  else if(lsr)d2='outbound';
  else if(src==='LP'){if(isSC)d2='inbound';else if(venue&&!cR)d2='outbound';else if(cR)d2='inbound';}
  else if(tp){const t=String(tp).toLowerCase();if(t.includes('dispatch')||t.includes('outbound'))d2='outbound';}
  let bg=src;
  if(tp){const t=String(tp).toLowerCase();if(t.includes('ffe')||t.includes('ff&e'))bg='FF&E';else if(t.includes('cort'))bg='CORT';else if(t.includes('freight'))bg='FREIGHT';else if(t.includes('truck')||t.includes('dispatch'))bg='TRUCK';else if(t.includes('manual'))bg='MANUAL';else bg=String(tp).toUpperCase().substring(0,10);}
  const nm=iN?String(iN):(vendor?String(vendor):`${src} #${idx}`);
  return{date:date?String(date):null,vendor:nm,itemName:nm,venue,pallets:plt?Number(plt):0,pieces:pcs?Number(pcs):0,truckId:tid?String(tid):null,type:bg,direction:d2,source:src,container:cont,lsr:lsr?String(lsr):null,_raw:e};
}

function gI(items){const g={};items.forEach(i=>{const k=i.container||i.venue||i.type||'Other';if(!g[k])g[k]={label:k,type:i.type,venue:i.venue,pallets:0,pieces:0,skus:{},items:[]};const r=g[k];r.pallets+=i.pallets||0;r.pieces+=i.pieces||0;r.items.push(i);const s=i.itemName;if(!r.skus[s])r.skus[s]={name:s,pallets:0,pieces:0,count:0};r.skus[s].pallets+=i.pallets||0;r.skus[s].pieces+=i.pieces||0;r.skus[s].count++;});return Object.values(g);}
function gO(items){const g={};items.forEach(i=>{const k=i.lsr||i.venue||i.truckId||i.type||'Other';if(!g[k])g[k]={label:k,type:i.type,venue:i.venue,lsr:i.lsr,truckId:i.truckId,pallets:0,pieces:0,skus:{},items:[],lsrs:new Set()};const r=g[k];r.pallets+=i.pallets||0;r.pieces+=i.pieces||0;r.items.push(i);if(!r.venue&&i.venue)r.venue=i.venue;
    // Collect LSR from parsed field
    if(i.lsr){r.lsrs.add(String(i.lsr));if(!r.lsr)r.lsr=i.lsr;}
    // Also scan raw entry for any field containing LSR pattern
    if(i._raw&&typeof i._raw==='object'){for(const rk of Object.keys(i._raw)){
      const rv=i._raw[rk];if(rv&&typeof rv==='string'&&/LSR/i.test(rv))r.lsrs.add(rv);
      if(rk.toUpperCase()==='LSR'&&rv)r.lsrs.add(String(rv));
    }}
    const s=i.itemName;if(!r.skus[s])r.skus[s]={name:s,pallets:0,pieces:0,count:0};r.skus[s].pallets+=i.pallets||0;r.skus[s].pieces+=i.pieces||0;r.skus[s].count++;});return Object.values(g);}

function rP(type,bkts){
  const con=document.getElementById(type==='in'?'id':'od');con.innerHTML='';
  const isOut=type==='out';
  bkts.forEach((b,idx)=>{
    const empty=!b.items.length,has=!empty;
    const col=document.createElement('div');
    let cls='dy dy-act';
    const isToday = fk(b.date) === fk(t0());
    if(isToday)cls+=' dy-today';
    if(empty)cls='dy dy-emp';
    col.className=cls;
    const label=dL(b.date);
    const groups=isOut?gO(b.items):gI(b.items);
    // Build skipped days note
    let skippedHtml='';
    if(b.skippedNote){
      skippedHtml=`<div style="font-size:var(--fs-xs);color:var(--tm);margin-top:1px;font-style:italic;opacity:.5">${b.skippedNote}</div>`;
    }
    col.innerHTML=`<div class="dh"><div><div class="dn">${label}${b.sh?` <span style="color:var(--tm);font-size:var(--fs-xs);opacity:.6">↗</span>`:''}</div><div class="dd">${fd(b.date)}</div>${skippedHtml}</div>${has?`<div class="db">${groups.length}</div>`:''}</div><div class="dcc"></div>`;
    con.appendChild(col);
    const cards=col.querySelector('.dcc');
    if(empty)cards.innerHTML=`<div class="emp"><div style="font-size:var(--fs-sm);opacity:.25">—</div><div>No activity</div></div>`;
    else groups.forEach(g=>cards.appendChild(mC(g,type)));
  });
}

function mC(g,pt){
  const c=document.createElement('div');c.className='cd';c.onclick=()=>oM(g);
  const bc=bC(g.type),sk=Object.values(g.skus).sort((a,b)=>b.pieces-a.pieces),t3=sk.slice(0,3);
  // Use pre-collected LSR values from grouping
  const lsrSet=new Set();
  if(g.lsr)lsrSet.add(String(g.lsr));
  if(g.lsrs)g.lsrs.forEach(l=>lsrSet.add(String(l)));
  const lsrArr=[...lsrSet].filter(Boolean);
  const lsrDisplay=lsrArr.join(' · ');
  // Don't show LSR badge if it duplicates the card title
  const labelIsLsr = g.label && lsrArr.length===1 && g.label===lsrArr[0];
  const m=[];
  if(g.pallets)m.push(`<span>PLT <span class="n">${R(g.pallets)}</span></span>`);
  if(g.pieces)m.push(`<span>PCS <span class="n">${Ri(g.pieces)}</span></span>`);
  if(g.truckId)m.push(`<span>TRK <span class="n">${esc(g.truckId)}</span></span>`);
  const lsrHtml=(!labelIsLsr && lsrDisplay)?`<div style="font-family:'Space Mono',monospace;font-size:var(--fs-xs);font-weight:700;color:var(--op);margin-bottom:2px;letter-spacing:.4px;display:inline-block;background:rgba(251,146,60,.06);padding:1px 4px;border-radius:3px;border:1px solid rgba(251,146,60,.12);text-shadow:0 0 8px rgba(251,146,60,.15)">LSR ${esc(lsrDisplay)}</div>`:'';
  let sh=t3.map(s=>`<div class="csl"><span class="csn">${esc(s.name)}</span><span class="csq">${Ri(s.pieces)} pcs</span></div>`).join('');
  if(sk.length>3)sh+=`<div class="csm">+${sk.length-3} more</div>`;
  const venueIsLabel = g.venue && g.label===g.venue;
  c.innerHTML=`<div class="ct"><div class="cv">${esc(g.label)}</div><span class="cb ${bc}">${esc(g.type)}</span></div>${lsrHtml}${m.length?`<div class="cm">${m.join('')}</div>`:''}${(g.venue && !venueIsLabel)?`<div class="cve"><span style="color:var(--tm);opacity:.6">→</span> ${esc(g.venue)}</div>`:''}${sh?`<div class="cs">${sh}</div>`:''}`;
  return c;
}

function bC(t){if(!t)return'b-oth';const l=t.toLowerCase();if(l.includes('cort'))return'b-cort';if(l.includes('ffe')||l.includes('ff&e'))return'b-ffe';if(l.includes('freight'))return'b-frt';if(l.includes('truck'))return'b-trk';if(l.includes('dispatch')||l.includes('lm'))return'b-dsp';if(l.includes('manual'))return'b-man';return'b-oth';}

function rK(type,bkts){
  const el=document.getElementById(type==='in'?'ik':'ok');
  const all=bkts.flatMap(b=>b.items);
  const gr=type==='in'?gI(all):gO(all);
  const p=all.reduce((s,i)=>s+(i.pallets||0),0),pc=all.reduce((s,i)=>s+(i.pieces||0),0);
  const v=new Set(all.map(i=>i.venue).filter(Boolean)).size,sk=new Set(all.map(i=>i.itemName).filter(Boolean)).size;
  el.innerHTML=`<div class="kc"><div class="kv">${gr.length}</div><div class="kl">${type==='in'?'Deliveries':'Dispatches'}</div></div><div class="kc"><div class="kv">${R(p)}</div><div class="kl">Pallets</div></div><div class="kc"><div class="kv">${Ri(pc)}</div><div class="kl">Pieces</div></div><div class="kc"><div class="kv">${sk}</div><div class="kl">SKUs</div></div><div class="kc"><div class="kv">${v}</div><div class="kl">Venues</div></div>`;
}



function oM(g){
  document.getElementById('mt').textContent=g.label;
  const b=document.getElementById('mb'),sk=Object.values(g.skus).sort((a,b2)=>b2.pieces-a.pieces);
  const lsrDisp=g.lsrs&&g.lsrs.size?[...g.lsrs].join(', '):(g.lsr||'');
  let h=`<div class="mkr">${lsrDisp?`<div class="mk"><div class="n" style="font-size:13px">${esc(lsrDisp)}</div><div class="l">LSR</div></div>`:''}<div class="mk"><div class="n">${R(g.pallets)}</div><div class="l">Pallets</div></div><div class="mk"><div class="n">${Ri(g.pieces)}</div><div class="l">Pieces</div></div><div class="mk"><div class="n">${sk.length}</div><div class="l">SKUs</div></div>${g.venue?`<div class="mk"><div class="n" style="font-size:13px">${esc(g.venue)}</div><div class="l">Destination</div></div>`:''}</div>`;
  if(sk.length){h+=`<table class="mt"><thead><tr><th>Material / SKU</th><th style="text-align:right">Pallets</th><th style="text-align:right">Pieces</th><th style="text-align:right">Lines</th></tr></thead><tbody>`;
  sk.forEach(s=>{h+=`<tr><td class="tn">${esc(s.name)}</td><td class="tq">${R(s.pallets)}</td><td class="tq">${Ri(s.pieces)}</td><td class="tq">${s.count}</td></tr>`;});
  h+=`<tr style="border-top:2px solid var(--bda)"><td class="tn" style="font-weight:700">TOTAL</td><td class="tq" style="font-weight:700">${R(g.pallets)}</td><td class="tq" style="font-weight:700">${Ri(g.pieces)}</td><td class="tq" style="font-weight:700">${g.items.length}</td></tr></tbody></table>`;}
  b.innerHTML=h;document.getElementById('mo').classList.add('active');
}
function clM(e){if(e&&e.target!==e.currentTarget)return;document.getElementById('mo').classList.remove('active');}
document.addEventListener('keydown',e=>{if(e.key==='Escape')clM();});

// Start only after password gate
if(sessionStorage.getItem('fwc26_auth')==='1'){
  document.getElementById('gate').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('ls').style.display='flex';
  init();
}
</script>
