<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Warehouse Inventory — FIFA WC 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100vh;width:100%;overflow:hidden}
body{background:#070b14;font-family:system-ui,-apple-system,sans-serif;color:#e2e8f0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes barGrow{from{transform:scaleX(0)}to{transform:scaleX(1)}}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#1e2d44;border-radius:2px}
</style>
</head>
<body>
<div id="root"></div>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
(function(){
var e=React.createElement,useState=React.useState,useEffect=React.useEffect,useMemo=React.useMemo,useRef=React.useRef;

/* Supabase — separate table: inventory_state */
var SB_URL="https://nuaxnvtwohfgbrluhsug.supabase.co";
var SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im51YXhudnR3b2hmZ2JybHVoc3VnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3NTgyNjAsImV4cCI6MjA4ODMzNDI2MH0.7WrxeoTkcT05GRXDalb0wv3q0GrXL7OGWLmY4IbqaTU";
var TABLE="inventory_state";

function sbSave(d){fetch(SB_URL+"/rest/v1/"+TABLE+"?id=eq.1",{method:"PATCH",headers:{"Content-Type":"application/json",apikey:SB_KEY,Authorization:"Bearer "+SB_KEY,Prefer:"return=representation"},body:JSON.stringify({data:d,updated_at:new Date().toISOString()})}).then(function(r){return r.json();}).then(function(rows){if(!rows||rows.length===0){fetch(SB_URL+"/rest/v1/"+TABLE,{method:"POST",headers:{"Content-Type":"application/json",apikey:SB_KEY,Authorization:"Bearer "+SB_KEY,Prefer:"return=minimal"},body:JSON.stringify({id:1,data:d,updated_at:new Date().toISOString()})});}}).catch(function(e){console.warn("sb:",e);});}
function sbLoad(){return fetch(SB_URL+"/rest/v1/"+TABLE+"?id=eq.1&select=data,updated_at",{headers:{apikey:SB_KEY,Authorization:"Bearer "+SB_KEY}}).then(function(r){return r.json();}).then(function(rows){return(rows&&rows[0])||null;}).catch(function(){return null;});}

/* Theme */
var BG="#070b14",S1="#0e1525",S2="#151d2e",BD="#1a2744",TX="#e2e8f0",TD="#7a8ba8",TM="#4a5a74";
var TEAL="#2dd4bf",CYAN="#22d3ee",GR="#34d399",AM="#fbbf24",PU="#a78bfa",BL="#60a5fa",RD="#f87171",PK="#f472b6",OR="#fb923c",GD="#d4a54a";
var OW_C={"Team Services":CYAN,"Event Logistics":TEAL,"Event Marketing":PK,"Competition Management":PU,"Partnership Rights Delivery":OR,"Technology":BL,"Pitch Management":AM};
var SRC_C={"FA":TEAL,"FCWC25":BL,"THD":AM,"ULINE":PU};

function fmt$(v){if(v>=1e6)return"$"+((v/1e6).toFixed(2))+"M";if(v>=1e3)return"$"+((v/1e3).toFixed(1))+"K";return"$"+v.toFixed(0);}
function fmtN(v){if(v>=1e6)return(v/1e6).toFixed(1)+"M";if(v>=1e3)return(v/1e3).toFixed(1)+"K";return String(v);}

/* Components */
function KPI(p){return e("div",{style:{background:S1,border:"1px solid "+BD,borderRadius:8,padding:"1.1vh 0.7vw",flex:1,minWidth:0}},e("div",{style:{fontSize:"min(0.55vw,9px)",fontWeight:700,textTransform:"uppercase",letterSpacing:1.2,color:TD,marginBottom:"0.3vh"}},p.label),e("div",{style:{fontSize:"min(1.8vw,26px)",fontWeight:800,color:p.color,fontFamily:"monospace",lineHeight:1,marginBottom:"0.2vh"}},p.value),p.sub?e("div",{style:{fontSize:"min(0.5vw,8px)",color:TM}},p.sub):null);}

function HBar(p){
  var max=0;p.data.forEach(function(d){if(d.value>max)max=d.value;});if(!max)max=1;
  return e("div",{style:{display:"flex",flexDirection:"column",gap:"0.4vh"}},
    p.data.map(function(d,i){var pct=Math.round(d.value/max*100);var color=d.color||CYAN;
      return e("div",{key:i,style:{display:"flex",alignItems:"center",gap:5}},
        e("div",{style:{width:p.lw||"5vw",fontSize:"min(0.5vw,8px)",color:TD,textAlign:"right",flexShrink:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"},title:d.fullName||d.name},d.name),
        e("div",{style:{flex:1,height:"0.6vh",background:S2,borderRadius:3,overflow:"hidden"}},e("div",{style:{height:"100%",width:pct+"%",background:color,borderRadius:3,transformOrigin:"left",animation:"barGrow .6s ease"}})),
        e("span",{style:{fontSize:"min(0.5vw,8px)",fontWeight:700,color:color,fontFamily:"monospace",minWidth:"2.5vw",textAlign:"right"}},p.fmt?p.fmt(d.value):d.value)
      );
    })
  );
}

function Donut(p){
  var total=0;p.data.forEach(function(d){total+=d.value;});if(!total)return null;
  var sz=p.size||85,cx=sz/2,cy=sz/2,r=sz*.42,r2=sz*.24,angle=-90;
  var paths=p.data.map(function(d){
    var sw=Math.max(d.value/total*360,0.5),s=angle*Math.PI/180,en=(angle+sw)*Math.PI/180,lg=sw>180?1:0;
    var x1=cx+r*Math.cos(s),y1=cy+r*Math.sin(s),x2=cx+r*Math.cos(en),y2=cy+r*Math.sin(en);
    var ix1=cx+r2*Math.cos(en),iy1=cy+r2*Math.sin(en),ix2=cx+r2*Math.cos(s),iy2=cy+r2*Math.sin(s);
    angle+=sw;return{d:"M "+x1+" "+y1+" A "+r+" "+r+" 0 "+lg+" 1 "+x2+" "+y2+" L "+ix1+" "+iy1+" A "+r2+" "+r2+" 0 "+lg+" 0 "+ix2+" "+iy2+" Z",color:d.color};
  });
  return e("svg",{viewBox:"0 0 "+sz+" "+sz,style:{width:"100%",maxWidth:sz,height:"auto"}},paths.map(function(pp,i){return e("path",{key:i,d:pp.d,fill:pp.color,opacity:.85});}),e("text",{x:cx,y:cy-1,textAnchor:"middle",fill:TX,fontSize:sz*.13,fontWeight:800,fontFamily:"monospace"},p.center),e("text",{x:cx,y:cy+sz*.09,textAnchor:"middle",fill:TM,fontSize:sz*.07},p.sub||""));
}

function DaysBars(p){
  var data=p.data;var max=0;data.forEach(function(d){if(d.value>max)max=d.value;});if(!max)max=1;
  var cols=[GR,TEAL,BL,AM,RD];
  return e("div",{style:{display:"flex",alignItems:"flex-end",gap:"0.3vw",height:"100%",padding:"0 0.2vw"}},
    data.map(function(d,i){var pct=Math.max(Math.round(d.value/max*100),5);
      return e("div",{key:i,style:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}},
        e("div",{style:{fontSize:"min(0.55vw,9px)",fontWeight:700,color:cols[i],fontFamily:"monospace"}},d.value),
        e("div",{style:{width:"100%",height:pct+"%",background:cols[i],borderRadius:"3px 3px 0 0",opacity:.75,minHeight:3}}),
        e("div",{style:{fontSize:"min(0.4vw,7px)",color:TM,textAlign:"center",marginTop:2}},d.label)
      );
    })
  );
}

function Box(p){
  return e("div",{style:Object.assign({background:S1,border:"1px solid "+BD,borderRadius:8,padding:"0.6vh 0.6vw",display:"flex",flexDirection:"column",overflow:"hidden"},p.style||{})},
    e("div",{style:{fontSize:"min(0.55vw,9px)",fontWeight:700,textTransform:"uppercase",letterSpacing:1,color:TD,marginBottom:"0.3vh",flexShrink:0}},p.title),
    e("div",{style:{flex:1,minHeight:0,overflow:"hidden",display:"flex",flexDirection:"column"}},p.children)
  );
}

/* ══════════════════════════════════════════════════════ */
function App(){
  var _stk=useState(null),stock=_stk[0],setStock=_stk[1];
  var _nom=useState(null),nomen=_nom[0],setNomen=_nom[1];
  var _fn=useState({s:"",n:""}),fnames=_fn[0],setFnames=_fn[1];
  var _u=useState(null),updated=_u[0],setUpdated=_u[1];
  var _r=useState(false),ready=_r[0],setReady=_r[1];
  var _sb=useState(false),sbOk=_sb[0],setSbOk=_sb[1];
  var _c=useState(new Date()),clock=_c[0],setClock=_c[1];
  var _msg=useState(""),msg=_msg[0],setMsg=_msg[1];

  useEffect(function(){var t=setInterval(function(){setClock(new Date());},1000);return function(){clearInterval(t);};},[]);
  useEffect(function(){sbLoad().then(function(s){if(s&&s.data){if(s.data.stock)setStock(s.data.stock);if(s.data.nomen)setNomen(s.data.nomen);if(s.data.fnames)setFnames(s.data.fnames);setUpdated(s.updated_at);}setSbOk(true);setReady(true);}).catch(function(){setReady(true);});},[]);

  function doSave(newStock,newNomen,newFn){
    var stkToSave=newStock||stock;
    var nomToSave=newNomen||nomen;
    var fnToSave=newFn||fnames;
    var now=new Date().toISOString();
    setUpdated(now);
    sbSave({stock:stkToSave,nomen:nomToSave,fnames:fnToSave});
  }

  /* Auto-detect and parse multiple files at once */
  function handleFiles(ev){
    var files=ev.target.files;
    if(!files||!files.length)return;
    var pending=files.length;
    var newStock=null,newNomen=null,newFn=Object.assign({},fnames);
    var detected=[];

    function finish(){
      pending--;
      if(pending>0)return;
      /* Apply */
      if(newStock){setStock(newStock);newFn.s=detected.filter(function(d){return d.type==="stock";})[0]?.name||"";}
      if(newNomen){setNomen(newNomen);newFn.n=detected.filter(function(d){return d.type==="nomen";})[0]?.name||"";}
      setFnames(newFn);
      doSave(newStock||stock,newNomen||nomen,newFn);
      if(newStock&&newNomen)setMsg("Both files loaded");
      else if(newStock)setMsg("Stock report loaded"+(nomen?" (using existing nomenclature)":"\u2014 upload nomenclature for values"));
      else if(newNomen)setMsg("Nomenclature loaded"+(stock?" (using existing stock)":"\u2014 upload stock report for inventory"));
      setTimeout(function(){setMsg("");},4000);
    }

    Array.from(files).forEach(function(file){
      var reader=new FileReader();
      reader.onload=function(evt){
        try{
          var wb=XLSX.read(new Uint8Array(evt.target.result),{type:"array"});
          var sheet=wb.Sheets[wb.SheetNames[0]];
          var rows=XLSX.utils.sheet_to_json(sheet,{defval:null});
          if(!rows.length){finish();return;}

          var cols=Object.keys(rows[0]);
          /* Detect: stock report has "Asset owner" and "Day in stock" */
          var isStock=cols.indexOf("Asset owner")>=0||cols.indexOf("Day in stock")>=0;
          /* Nomenclature has "Item price, USD" or "Nomenclature type" */
          var isNomen=cols.indexOf("Item price, USD")>=0||cols.indexOf("Nomenclature type")>=0;

          if(isStock&&!isNomen){
            newStock=rows.map(function(r){return{code:r["Nomenclature code"],name:r["Nomenclature name"],owner:r["Asset owner"],source:r["Source"],stock:r["Stock"]||0,reserve:r["Reserve"]||0,available:r["Available"]||0,uom:r["UoM"],days:r["Day in stock"]||0};});
            detected.push({type:"stock",name:file.name});
          }else if(isNomen){
            newNomen=rows.map(function(r){return{code:r["Nomenclature code"],name:r["Nomenclature name"],type:r["Nomenclature type"],price:r["Item price, USD"]||0,source:r["Source"],country:r["Country of origin"],dissolution:r["Dissolution"],consumable:String(r["Consumable"])==="True"};});
            detected.push({type:"nomen",name:file.name});
          }
        }catch(err){console.error(err);}
        finish();
      };
      reader.readAsArrayBuffer(file);
    });
    ev.target.value="";
  }

  /* Stats */
  var st=useMemo(function(){
    if(!stock||!stock.length)return null;
    var priceMap={},typeMap={};
    if(nomen){nomen.forEach(function(n){if(n.code){priceMap[n.code]=n.price||0;typeMap[n.code]=n.type||"Unknown";}});}
    var hasNomen=nomen&&nomen.length>0;

    var totalSKU=stock.length,totalStock=0,totalRes=0,totalAvail=0,totalVal=0;
    var byOwnerQty={},byOwnerVal={},bySource={},byNomType={},byNomTypeVal={};
    var daysBuckets=[{label:"0-7d",value:0},{label:"8-14d",value:0},{label:"15-30d",value:0},{label:"31-45d",value:0},{label:"46d+",value:0}];
    var topItems=[],reservedItems=[];

    stock.forEach(function(s){
      totalStock+=s.stock;totalRes+=s.reserve;totalAvail+=s.available;
      var p=priceMap[s.code]||0;var val=s.stock*p;totalVal+=val;
      var ow=s.owner||"Unknown";
      byOwnerQty[ow]=(byOwnerQty[ow]||0)+s.stock;
      byOwnerVal[ow]=(byOwnerVal[ow]||0)+val;
      var src=s.source||"Other";
      bySource[src]=(bySource[src]||0)+s.stock;
      var nt=typeMap[s.code]||"Unknown";
      byNomType[nt]=(byNomType[nt]||0)+s.stock;
      byNomTypeVal[nt]=(byNomTypeVal[nt]||0)+val;
      var d=s.days||0;
      if(d<=7)daysBuckets[0].value++;else if(d<=14)daysBuckets[1].value++;else if(d<=30)daysBuckets[2].value++;else if(d<=45)daysBuckets[3].value++;else daysBuckets[4].value++;
      topItems.push({name:s.name,owner:ow,stock:s.stock,price:p,value:val});
      if(s.reserve>0)reservedItems.push({name:s.name,reserve:s.reserve,owner:ow});
    });
    topItems.sort(function(a,b){return b.value-a.value;});

    var ownerValArr=Object.entries(byOwnerVal).map(function(en){return{name:en[0].length>18?en[0].slice(0,16)+"..":en[0],fullName:en[0],value:en[1],color:OW_C[en[0]]||TD};}).sort(function(a,b){return b.value-a.value;});
    var ownerQtyArr=Object.entries(byOwnerQty).map(function(en){return{name:en[0].length>18?en[0].slice(0,16)+"..":en[0],fullName:en[0],value:en[1],color:OW_C[en[0]]||TD};}).sort(function(a,b){return b.value-a.value;});
    var sourceArr=Object.entries(bySource).map(function(en){return{name:en[0],value:en[1],color:SRC_C[en[0]]||TD};}).sort(function(a,b){return b.value-a.value;});

    var avgDays=0,dc=0;stock.forEach(function(s){if(s.days!=null){avgDays+=s.days;dc++;}});avgDays=dc?Math.round(avgDays/dc):0;

    return{totalSKU:totalSKU,totalStock:totalStock,totalRes:totalRes,totalAvail:totalAvail,totalVal:totalVal,hasNomen:hasNomen,
      ownerValArr:ownerValArr,ownerQtyArr:ownerQtyArr,sourceArr:sourceArr,daysBuckets:daysBuckets,
      topItems:topItems.slice(0,8),reservedItems:reservedItems,byNomType:byNomType,byNomTypeVal:byNomTypeVal,
      avgDays:avgDays,catalogSize:nomen?nomen.length:0};
  },[stock,nomen]);

  var has=stock&&stock.length>0&&st;

  return e("div",{style:{height:"100vh",display:"flex",flexDirection:"column",background:BG,color:TX,overflow:"hidden"}},

    /* HEADER */
    e("header",{style:{padding:"0.5vh 1.2vw",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:"1px solid "+BD,background:S1,flexShrink:0}},
      e("div",{style:{display:"flex",alignItems:"center",gap:"0.5vw"}},
        e("div",{style:{width:"1.8vw",height:"1.8vw",minWidth:22,minHeight:22,borderRadius:5,background:TEAL,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:"min(0.9vw,13px)",color:BG}},"I"),
        e("div",null,
          e("div",{style:{fontSize:"min(0.8vw,13px)",fontWeight:700}},"Warehouse Inventory"),
          e("div",{style:{fontSize:"min(0.5vw,8px)",color:TD}},"Dallas \u2014 Main Logistics Center \u2014 FIFA WC 2026")
        )
      ),
      e("div",{style:{display:"flex",alignItems:"center",gap:"0.7vw"}},
        /* File status indicators */
        e("div",{style:{display:"flex",gap:"0.4vw",fontSize:"min(0.45vw,7px)"}},
          e("span",{style:{color:stock?GR:TM}},stock?"\u2713 Stock":"○ Stock"),
          e("span",{style:{color:nomen?GR:TM}},nomen?"\u2713 Catalog":"○ Catalog")
        ),
        msg?e("span",{style:{fontSize:"min(0.5vw,8px)",color:GR,fontWeight:600}},msg):null,
        updated?e("div",{style:{fontSize:"min(0.4vw,7px)",color:TM}},"Updated "+new Date(updated).toLocaleString("en-US",{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"})):null,
        /* Single upload button - accepts multiple files */
        e("label",{style:{background:S2,border:"1px solid "+BD,borderRadius:5,padding:"0.4vh 0.7vw",color:TEAL,fontSize:"min(0.55vw,9px)",fontWeight:600,cursor:"pointer"}},
          "\u2191 Upload Files",
          e("input",{type:"file",accept:".xlsx,.xls,.csv",multiple:true,onChange:handleFiles,style:{display:"none"}})
        ),
        e("div",{style:{fontFamily:"monospace",fontSize:"min(0.85vw,14px)",fontWeight:700,color:TEAL}},clock.toLocaleTimeString("en-US",{hour12:false})),
        e("div",{style:{width:6,height:6,borderRadius:"50%",background:sbOk?GR:AM}})
      )
    ),

    /* MAIN */
    e("main",{style:{flex:1,padding:"0.6vh 0.8vw",display:"flex",flexDirection:"column",gap:"0.5vh",overflow:"hidden",minHeight:0}},

      /* Empty state */
      !has&&ready?e("div",{style:{textAlign:"center",paddingTop:"14vh"}},
        e("div",{style:{fontSize:50,opacity:.12,marginBottom:16}},"\uD83C\uDFED"),
        e("div",{style:{fontSize:18,fontWeight:700,color:TD,marginBottom:8}},"No Inventory Data"),
        e("div",{style:{fontSize:13,color:TM,marginBottom:8}},"Select both files at once \u2014 they\u2019ll be auto-detected"),
        e("div",{style:{fontSize:12,color:TM,marginBottom:24}},
          e("span",{style:{color:TEAL}},"\u25CF Stock Report"),
          " (has Asset owner, Day in stock) + ",
          e("span",{style:{color:BL}},"\u25CF Nomenclature"),
          " (has Item price, Nomenclature type)"
        ),
        e("label",{style:{display:"inline-block",background:TEAL,borderRadius:10,padding:"14px 40px",color:BG,fontSize:14,fontWeight:700,cursor:"pointer"}},
          "Select Both Files",
          e("input",{type:"file",accept:".xlsx,.xls,.csv",multiple:true,onChange:handleFiles,style:{display:"none"}})
        )
      ):null,

      /* Dashboard */
      has?e(React.Fragment,null,

        /* ROW 1: KPIs */
        e("div",{style:{display:"flex",gap:"0.4vw",flexShrink:0}},
          e(KPI,{label:"SKUs in Stock",value:fmtN(st.totalSKU),sub:"unique items",color:TEAL}),
          e(KPI,{label:"Total Units",value:fmtN(st.totalStock),sub:"in warehouse",color:CYAN}),
          e(KPI,{label:"Available",value:fmtN(st.totalAvail),sub:fmtN(st.totalRes)+" reserved",color:GR}),
          e(KPI,{label:"Reserved",value:fmtN(st.totalRes),sub:st.reservedItems.length+" items",color:AM}),
          st.hasNomen?e(KPI,{label:"Est. Value",value:fmt$(st.totalVal),sub:"based on catalog",color:GD}):e(KPI,{label:"Est. Value",value:"-",sub:"upload nomenclature",color:TM}),
          st.hasNomen?e(KPI,{label:"Catalog",value:fmtN(st.catalogSize),sub:"nomenclature items",color:BL}):null,
          e(KPI,{label:"Avg Days",value:st.avgDays,sub:"in stock",color:PU})
        ),

        /* ROW 2: Value by Owner | Owner donut | Days | Source */
        e("div",{style:{display:"grid",gridTemplateColumns:st.hasNomen?"2fr 1.5fr 1fr 1.5fr":"0fr 2fr 1fr 2fr",gap:"0.4vw",flex:4,minHeight:0}},

          /* Value by owner — only if nomenclature loaded */
          st.hasNomen?e(Box,{title:"Value by Asset Owner"},
            e("div",{style:{flex:1,display:"flex",flexDirection:"column",justifyContent:"center"}},
              e(HBar,{data:st.ownerValArr,lw:"5.5vw",fmt:fmt$})
            )
          ):null,

          /* Owner donut */
          e(Box,{title:"Units by Asset Owner"},
            e("div",{style:{display:"flex",alignItems:"center",gap:"0.5vw",flex:1}},
              e("div",{style:{flexShrink:0,width:"5vw"}},
                e(Donut,{data:st.ownerQtyArr.map(function(d){return{value:d.value,color:d.color};}),size:85,center:fmtN(st.totalStock),sub:"units"})
              ),
              e("div",{style:{display:"flex",flexDirection:"column",gap:"0.3vh",flex:1}},
                st.ownerQtyArr.map(function(d){return e("div",{key:d.name,style:{display:"flex",alignItems:"center",gap:4,fontSize:"min(0.5vw,8px)"}},
                  e("span",{style:{width:6,height:6,borderRadius:2,background:d.color,display:"inline-block",flexShrink:0}}),
                  e("span",{style:{color:TD,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"},title:d.fullName},d.name),
                  e("span",{style:{color:TX,fontWeight:700,fontFamily:"monospace",flexShrink:0}},fmtN(d.value))
                );})
              )
            )
          ),

          /* Days in stock */
          e(Box,{title:"Days in Stock"},
            e("div",{style:{flex:1,minHeight:0}},e(DaysBars,{data:st.daysBuckets}))
          ),

          /* Source */
          e(Box,{title:"Units by Source"},
            e("div",{style:{flex:1,display:"flex",flexDirection:"column",justifyContent:"center"}},
              e(HBar,{data:st.sourceArr,lw:"3.5vw",fmt:fmtN})
            )
          )
        ),

        /* ROW 3: Top Items | Reserved + Category */
        e("div",{style:{display:"grid",gridTemplateColumns:"3fr 1.2fr",gap:"0.4vw",flex:4,minHeight:0}},

          /* Top items table */
          e(Box,{title:st.hasNomen?"Top Value Items":"All Items (upload nomenclature for values)"},
            e("div",{style:{flex:1,overflowY:"auto",minHeight:0}},
              e("table",{style:{width:"100%",borderCollapse:"collapse",fontSize:"min(0.55vw,9px)"}},
                e("thead",null,e("tr",{style:{borderBottom:"1px solid "+BD}},
                  (st.hasNomen?["#","Item","Owner","Qty","Unit $","Total Value"]:["#","Item","Owner","Qty","UoM","Days"]).map(function(h){return e("th",{key:h,style:{padding:"0.3vh 0.3vw",textAlign:"left",fontSize:"min(0.45vw,7px)",fontWeight:700,color:TM,textTransform:"uppercase",position:"sticky",top:0,background:S1}},h);})
                )),
                e("tbody",null,(st.hasNomen?st.topItems:stock.slice(0,8)).map(function(t,i){
                  var owColor=OW_C[t.owner]||TD;
                  if(st.hasNomen){
                    return e("tr",{key:i,style:{borderBottom:"1px solid "+BD+"15"}},
                      e("td",{style:{padding:"0.3vh 0.3vw",fontFamily:"monospace",fontWeight:600,color:TM}},i+1),
                      e("td",{style:{padding:"0.3vh 0.3vw",color:TX,maxWidth:"14vw",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},t.name),
                      e("td",{style:{padding:"0.3vh 0.3vw",color:owColor,fontSize:"min(0.5vw,8px)",fontWeight:600}},t.owner),
                      e("td",{style:{padding:"0.3vh 0.3vw",fontFamily:"monospace",color:CYAN,fontWeight:600}},fmtN(t.stock)),
                      e("td",{style:{padding:"0.3vh 0.3vw",fontFamily:"monospace",color:TD}},t.price?"$"+Number(t.price).toLocaleString():"-"),
                      e("td",{style:{padding:"0.3vh 0.3vw",fontFamily:"monospace",color:GD,fontWeight:700}},t.value?fmt$(t.value):"-")
                    );
                  }else{
                    return e("tr",{key:i,style:{borderBottom:"1px solid "+BD+"15"}},
                      e("td",{style:{padding:"0.3vh 0.3vw",fontFamily:"monospace",fontWeight:600,color:TM}},i+1),
                      e("td",{style:{padding:"0.3vh 0.3vw",color:TX,maxWidth:"14vw",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},t.name),
                      e("td",{style:{padding:"0.3vh 0.3vw",color:owColor,fontSize:"min(0.5vw,8px)",fontWeight:600}},t.owner),
                      e("td",{style:{padding:"0.3vh 0.3vw",fontFamily:"monospace",color:CYAN,fontWeight:600}},fmtN(t.stock)),
                      e("td",{style:{padding:"0.3vh 0.3vw",color:TD}},t.uom||"-"),
                      e("td",{style:{padding:"0.3vh 0.3vw",fontFamily:"monospace",color:PU}},t.days!=null?t.days+"d":"-")
                    );
                  }
                }))
              )
            )
          ),

          /* Right column: Reserved + Category */
          e("div",{style:{display:"flex",flexDirection:"column",gap:"0.4vw",minHeight:0}},

            e(Box,{title:e("span",{style:{display:"flex",alignItems:"center",gap:4}},e("span",{style:{width:5,height:5,borderRadius:"50%",background:AM,display:"inline-block",animation:"pulse 2s infinite"}}),"Reserved ("+st.reservedItems.length+")"),style:{flex:1}},
              st.reservedItems.length>0?e("div",{style:{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:"0.3vh"}},
                st.reservedItems.slice(0,6).map(function(r,i){
                  return e("div",{key:i,style:{display:"flex",alignItems:"center",gap:"0.3vw",padding:"0.3vh 0.3vw",background:S2,borderRadius:4,border:"1px solid "+BD}},
                    e("span",{style:{fontFamily:"monospace",fontWeight:700,color:AM,fontSize:"min(0.6vw,10px)",flexShrink:0}},r.reserve),
                    e("div",{style:{flex:1,minWidth:0}},
                      e("div",{style:{fontSize:"min(0.5vw,8px)",color:TX,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}},r.name),
                      e("div",{style:{fontSize:"min(0.4vw,7px)",color:TM}},r.owner)
                    )
                  );
                })
              ):e("div",{style:{color:TM,fontSize:"min(0.5vw,8px)",textAlign:"center",paddingTop:"2vh"}},"No reserved items")
            ),

            st.hasNomen?e(Box,{title:"By Category",style:{flex:1}},
              e("div",{style:{flex:1,display:"flex",flexDirection:"column",justifyContent:"center",gap:"0.5vh"}},
                Object.entries(st.byNomType).filter(function(en){return en[0]!=="Unknown";}).map(function(en,i){
                  var col=[TEAL,BL,PU][i%3];
                  return e("div",{key:en[0],style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"0.4vh 0.4vw",background:S2,borderRadius:4,border:"1px solid "+BD}},
                    e("div",null,
                      e("div",{style:{fontSize:"min(0.55vw,9px)",color:col,fontWeight:600}},en[0]),
                      e("div",{style:{fontSize:"min(0.4vw,7px)",color:TM}},fmtN(en[1])+" units")
                    ),
                    e("div",{style:{textAlign:"right"}},
                      e("div",{style:{fontSize:"min(0.6vw,10px)",fontFamily:"monospace",fontWeight:700,color:col}},fmt$(st.byNomTypeVal[en[0]]||0))
                    )
                  );
                })
              )
            ):e(Box,{title:"Category",style:{flex:1}},
              e("div",{style:{color:TM,fontSize:"min(0.5vw,8px)",textAlign:"center",paddingTop:"2vh"}},"Upload nomenclature for category breakdown")
            )
          )
        )
      ):null
    ),

    /* FOOTER */
    e("footer",{style:{padding:"0.3vh 1.2vw",borderTop:"1px solid "+BD,display:"flex",justifyContent:"space-between",fontSize:"min(0.5vw,8px)",color:TM,flexShrink:0}},
      e("span",null,"Warehouse Inventory Dashboard v1.0"),
      e("span",null,sbOk?"\u25CF Supabase Connected (inventory_state)":"\u25CB Connecting..."),
      e("span",null,clock.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"}))
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(e(App));
})();
</script>
