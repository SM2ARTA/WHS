<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FWC26 Dallas Main Logistics Center — Activity Forecast</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,300&family=Space+Mono:wght@400;700&display=swap');
  :root{--bg:#030711;--sf:#080d18;--sf2:#0c1322;--sfh:#141e36;--bd:#111a2c;--bda:#1e3050;--tx:#e4eaf4;--td:#94a3bb;--tm:#4e5d74;--ip:#38bdf8;--ip2:#0ea5e9;--ig:#38bdf818;--ig2:#38bdf808;--op:#fb923c;--op2:#f97316;--og:#fb923c18;--og2:#fb923c08;--gn:#34d399;--kb:rgba(255,255,255,0.015);
    --fs-xs:clamp(6px,.35vw,9px);--fs-sm:clamp(7px,.45vw,11px);--fs-md:clamp(9px,.55vw,13px);--fs-lg:clamp(11px,.7vw,16px);--fs-kpi:clamp(16px,1.3vw,30px);
    --sp-xs:clamp(1px,.08vw,2px);--sp-sm:clamp(2px,.15vw,4px);--sp-md:clamp(3px,.22vw,6px);--sp-lg:clamp(5px,.35vw,9px);
    --glow-in:0 0 30px rgba(56,189,248,.06);--glow-out:0 0 30px rgba(251,146,60,.06)}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);overflow:hidden;height:100vh;width:100vw}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 25% 50%,rgba(56,189,248,.02) 0%,transparent 60%),radial-gradient(ellipse 80% 50% at 75% 50%,rgba(251,146,60,.02) 0%,transparent 60%);pointer-events:none;z-index:0}
  body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px);pointer-events:none;z-index:9999}

  .topbar{display:flex;justify-content:space-between;align-items:center;padding:0 1.2vw;background:linear-gradient(180deg,rgba(12,18,32,.95) 0%,rgba(6,10,20,.98) 100%);border-bottom:1px solid var(--bd);height:clamp(24px,2.2vh,36px);flex-shrink:0;position:relative;z-index:1}
  .topbar::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:1px;background:linear-gradient(90deg,rgba(56,189,248,.2) 0%,rgba(56,189,248,.05) 25%,transparent 50%,rgba(251,146,60,.05) 75%,rgba(251,146,60,.2) 100%)}
  .topbar-left{display:flex;align-items:center;gap:var(--sp-lg)}
  .topbar-logo{font-family:'Space Mono',monospace;font-weight:700;font-size:var(--fs-lg);color:var(--ip);letter-spacing:-0.5px;text-shadow:0 0 16px rgba(56,189,248,.35),0 0 40px rgba(56,189,248,.1)}
  .topbar-title{font-size:var(--fs-sm);color:var(--td);font-weight:300;opacity:.8}
  .topbar-right{display:flex;align-items:center;gap:var(--sp-lg);font-family:'Space Mono',monospace;font-size:var(--fs-sm);color:var(--tm)}
  .dot{width:clamp(5px,.3vw,8px);height:clamp(5px,.3vw,8px);border-radius:50%;background:var(--gn);display:inline-block;animation:p 2.5s ease-in-out infinite;box-shadow:0 0 6px rgba(52,211,153,.6),0 0 16px rgba(52,211,153,.2)}
  @keyframes p{0%,100%{opacity:1;box-shadow:0 0 6px rgba(52,211,153,.6),0 0 16px rgba(52,211,153,.2)}50%{opacity:.4;box-shadow:0 0 3px rgba(52,211,153,.3)}}

  .main{display:flex;height:calc(100vh - clamp(24px,2.2vh,36px));position:relative;z-index:1}
  .panel{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
  .panel-in{position:relative}
  .panel-in::after{content:'';position:absolute;right:0;top:0;bottom:0;width:1px;background:linear-gradient(180deg,rgba(56,189,248,.25) 0%,var(--bd) 20%,var(--bd) 80%,rgba(251,146,60,.25) 100%);z-index:2}
  .ph{padding:var(--sp-sm) var(--sp-md) var(--sp-xs);flex-shrink:0}
  .pl{font-family:'Space Mono',monospace;font-size:var(--fs-xs);font-weight:700;text-transform:uppercase;letter-spacing:2px;display:flex;align-items:center;gap:var(--sp-sm)}
  .panel-in .pl{color:var(--ip)}.panel-out .pl{color:var(--op)}
  .pl-line{flex:1;height:1px;background:linear-gradient(90deg,var(--bd) 0%,transparent 100%)}

  .ks{display:flex;gap:var(--sp-xs);padding:var(--sp-xs) var(--sp-md) var(--sp-sm);flex-shrink:0}
  .kc{flex:1;background:linear-gradient(180deg,rgba(255,255,255,.018) 0%,rgba(255,255,255,.005) 100%);border:1px solid var(--bd);border-radius:4px;padding:var(--sp-sm) var(--sp-sm);position:relative;overflow:hidden}
  .panel-in .kc{border-bottom-color:rgba(56,189,248,.12);box-shadow:var(--glow-in)}
  .panel-out .kc{border-bottom-color:rgba(251,146,60,.12);box-shadow:var(--glow-out)}
  .kc::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent)}
  .kv{font-family:'Space Mono',monospace;font-size:var(--fs-kpi);font-weight:700;line-height:1}
  .panel-in .kv{color:var(--ip);text-shadow:0 0 24px rgba(56,189,248,.25),0 1px 0 rgba(0,0,0,.5)}.panel-out .kv{color:var(--op);text-shadow:0 0 24px rgba(251,146,60,.25),0 1px 0 rgba(0,0,0,.5)}
  .kl{font-size:var(--fs-xs);color:var(--tm);text-transform:uppercase;letter-spacing:.8px;font-weight:500;margin-top:1px}

  .dc{display:flex;flex:1;overflow:hidden;padding:0 var(--sp-sm) var(--sp-sm);gap:var(--sp-sm)}
  .dy{display:flex;flex-direction:column;border-radius:5px;overflow:hidden;border:1px solid var(--bd);background:linear-gradient(180deg,var(--sf) 0%,rgba(6,10,20,.6) 100%);min-width:0;box-shadow:0 2px 8px rgba(0,0,0,.2)}
  .dy-act{flex:3}.dy-emp{flex:1;min-width:40px;opacity:.4}.dy-up{flex:2}
  .dh{padding:var(--sp-sm) var(--sp-sm);border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;background:linear-gradient(180deg,rgba(255,255,255,.012) 0%,transparent 100%)}
  .dn{font-weight:700;font-size:var(--fs-md);letter-spacing:.2px}
  .dd{font-family:'Space Mono',monospace;font-size:var(--fs-xs);color:var(--tm)}
  .dy-today{border-color:rgba(56,189,248,.18);box-shadow:0 0 20px rgba(56,189,248,.04),0 2px 8px rgba(0,0,0,.2)}
  .dy-today .dh{background:linear-gradient(180deg,rgba(56,189,248,.07) 0%,rgba(56,189,248,.01) 100%)}
  .dy-today .dn{color:var(--ip)}
  .panel-out .dy-today{border-color:rgba(251,146,60,.18);box-shadow:0 0 20px rgba(251,146,60,.04),0 2px 8px rgba(0,0,0,.2)}
  .panel-out .dy-today .dh{background:linear-gradient(180deg,rgba(251,146,60,.07) 0%,rgba(251,146,60,.01) 100%)}
  .panel-out .dy-today .dn{color:var(--op)}
  .db{font-family:'Space Mono',monospace;font-size:var(--fs-xs);padding:1px var(--sp-sm);border-radius:10px;font-weight:700;white-space:nowrap}
  .panel-in .db{background:rgba(56,189,248,.1);color:var(--ip);border:1px solid rgba(56,189,248,.15)}
  .panel-out .db{background:rgba(251,146,60,.1);color:var(--op);border:1px solid rgba(251,146,60,.15)}

  .dcc{flex:1;overflow-y:auto;padding:var(--sp-sm);display:flex;flex-direction:column;gap:var(--sp-sm)}
  .dcc::-webkit-scrollbar{width:2px}.dcc::-webkit-scrollbar-track{background:transparent}.dcc::-webkit-scrollbar-thumb{background:var(--bda);border-radius:1px}
  .emp{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;color:var(--tm);font-size:var(--fs-sm);gap:var(--sp-xs);opacity:.3}

  .cd{background:linear-gradient(180deg,rgba(255,255,255,.015) 0%,rgba(255,255,255,.003) 100%);border:1px solid var(--bd);border-left:2px solid var(--bd);border-radius:4px;padding:var(--sp-sm) var(--sp-sm);cursor:pointer;transition:all .15s ease;position:relative}
  .panel-in .cd{border-left-color:rgba(56,189,248,.18)}
  .panel-out .cd{border-left-color:rgba(251,146,60,.18)}
  .cd:hover{background:linear-gradient(180deg,rgba(255,255,255,.03) 0%,rgba(255,255,255,.01) 100%);border-color:var(--bda);transform:translateY(-1px)}
  .panel-in .cd:hover{border-left-color:var(--ip);box-shadow:0 4px 16px rgba(56,189,248,.08),inset 0 0 0 1px rgba(56,189,248,.05)}
  .panel-out .cd:hover{border-left-color:var(--op);box-shadow:0 4px 16px rgba(251,146,60,.08),inset 0 0 0 1px rgba(251,146,60,.05)}
  .ct{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:2px}
  .cv{font-weight:700;font-size:var(--fs-sm);line-height:1.15;max-width:72%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:.1px}
  .cb{font-family:'Space Mono',monospace;font-size:var(--fs-xs);padding:1px var(--sp-sm);border-radius:2px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;flex-shrink:0}
  .b-ffe{background:rgba(96,165,250,.08);color:#7db4fc;border:1px solid rgba(96,165,250,.15)}.b-cort{background:rgba(192,132,252,.08);color:#cda0fc;border:1px solid rgba(192,132,252,.15)}.b-frt{background:rgba(74,222,128,.08);color:#6ee7a0;border:1px solid rgba(74,222,128,.15)}.b-trk{background:rgba(251,191,36,.08);color:#fcd050;border:1px solid rgba(251,191,36,.15)}.b-dsp{background:rgba(249,115,22,.08);color:#fb923c;border:1px solid rgba(249,115,22,.15)}.b-man{background:rgba(232,121,249,.08);color:#f0a0fc;border:1px solid rgba(232,121,249,.15)}.b-oth{background:rgba(148,163,184,.06);color:#a0b0c4;border:1px solid rgba(148,163,184,.1)}
  .cm{display:flex;gap:var(--sp-sm);font-size:var(--fs-xs);color:var(--tm);margin-bottom:1px}
  .cm span{display:flex;align-items:center;gap:2px}.cm .n{font-family:'Space Mono',monospace;color:var(--td);font-weight:700}
  .cve{font-size:var(--fs-xs);color:var(--td);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:1px}
  .cs{border-top:1px solid rgba(255,255,255,.035);margin-top:var(--sp-xs);padding-top:2px}
  .csl{display:flex;justify-content:space-between;font-size:var(--fs-xs);padding:0;line-height:1.4}
  .csn{color:var(--td);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:68%;opacity:.85}
  .csq{font-family:'Space Mono',monospace;font-size:var(--fs-xs);color:var(--tm);font-weight:700}
  .csm{font-size:var(--fs-xs);color:var(--tm);font-style:italic;margin-top:0;opacity:.6}

  .mo{display:none;position:fixed;inset:0;background:rgba(3,7,17,.85);backdrop-filter:blur(12px);z-index:1000;align-items:center;justify-content:center}
  .mo.active{display:flex}
  .md{background:linear-gradient(180deg,#0c1322 0%,#080d18 100%);border:1px solid var(--bda);border-radius:10px;width:90%;max-width:700px;max-height:80vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 32px 100px rgba(0,0,0,.8),0 0 1px rgba(56,189,248,.15),0 0 60px rgba(56,189,248,.03)}
  .mdh{padding:18px 22px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center;background:linear-gradient(180deg,rgba(255,255,255,.01) 0%,transparent 100%)}
  .mdh h2{font-size:var(--fs-lg);font-weight:700}
  .mx{background:none;border:1px solid var(--bd);color:var(--td);width:34px;height:34px;border-radius:6px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .12s}
  .mx:hover{background:var(--sfh);color:var(--tx);border-color:var(--bda)}
  .mdb{padding:18px 22px;overflow-y:auto;flex:1}
  .mkr{display:flex;gap:10px;margin-bottom:16px}
  .mk{flex:1;background:linear-gradient(180deg,rgba(255,255,255,.015) 0%,transparent 100%);border:1px solid var(--bd);border-radius:6px;padding:10px 12px;text-align:center}
  .mk .n{font-family:'Space Mono',monospace;font-size:var(--fs-lg);font-weight:700;color:var(--ip);text-shadow:0 0 16px rgba(56,189,248,.2)}
  .mk .l{font-size:var(--fs-xs);color:var(--tm);text-transform:uppercase;letter-spacing:.5px}
  .mt{width:100%;border-collapse:collapse;font-size:var(--fs-sm)}
  .mt th{text-align:left;padding:8px 10px;font-size:var(--fs-xs);text-transform:uppercase;letter-spacing:1px;color:var(--tm);border-bottom:1px solid var(--bd);font-weight:500}
  .mt td{padding:6px 10px;border-bottom:1px solid rgba(255,255,255,.03);color:var(--td)}
  .mt tr:last-child td{border-bottom:none}
  .mt .tn{color:var(--tx);font-weight:500;max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .mt .tq{font-family:'Space Mono',monospace;font-weight:700;text-align:right}

  .ls{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:2000;gap:16px;transition:opacity .5s ease}
  .ls.hide{opacity:0;pointer-events:none}
  .lsp{width:32px;height:32px;border:2px solid var(--bd);border-top-color:var(--ip);border-radius:50%;animation:sp .8s linear infinite;box-shadow:0 0 20px rgba(56,189,248,.15)}
  @keyframes sp{to{transform:rotate(360deg)}}
  .lt{font-family:'Space Mono',monospace;font-size:var(--fs-sm);color:var(--tm);text-align:center;max-width:400px}
  .dbt{position:fixed;bottom:8px;right:8px;z-index:900;background:var(--sf);border:1px solid var(--bd);color:var(--tm);font-family:'Space Mono',monospace;font-size:9px;padding:3px 8px;border-radius:3px;cursor:pointer;opacity:.15}
  .dbt:hover{opacity:.8}
  .dbp{display:none;position:fixed;bottom:34px;right:8px;width:550px;max-height:50vh;background:var(--sf);border:1px solid var(--bda);border-radius:6px;z-index:900;overflow:auto;padding:12px;font-family:'Space Mono',monospace;font-size:10px;color:var(--td);white-space:pre-wrap;word-break:break-all}
  .dbp.active{display:block}

  /* ── Page rotation ── */
  .page{display:none;height:100%;width:100%}
  .page.active{display:flex;flex-direction:column}
  .page-dots{position:fixed;bottom:clamp(6px,.5vh,12px);left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:100}
  .page-dot{width:clamp(5px,.35vw,8px);height:clamp(5px,.35vw,8px);border-radius:50%;background:var(--tm);opacity:.3;cursor:pointer;transition:all .3s}
  .page-dot.active{opacity:1;background:var(--ip);box-shadow:0 0 8px rgba(56,189,248,.4)}
  .page-timer{position:fixed;bottom:clamp(6px,.5vh,12px);left:50%;transform:translateX(-50%) translateY(-14px);font-family:'Space Mono',monospace;font-size:var(--fs-xs);color:var(--tm);opacity:.3;z-index:100}

  /* ── Page 2: Supply Chain Status ── */
  .sc-grid{display:grid;grid-template-columns:1fr 1.2fr 1fr 1fr;grid-template-rows:1fr auto;gap:var(--sp-sm);padding:var(--sp-sm);flex:1;overflow:hidden}
  .sc-section{background:linear-gradient(180deg,rgba(255,255,255,.018) 0%,rgba(255,255,255,.005) 100%);border:1px solid var(--bd);border-radius:5px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.2)}
  .sc-section.sc-wide{grid-column:span 4}
  .sc-sh{padding:var(--sp-sm) var(--sp-md);border-bottom:1px solid var(--bd);display:flex;align-items:center;flex-shrink:0;background:linear-gradient(180deg,rgba(255,255,255,.012) 0%,transparent 100%)}
  .sc-sh .pl{margin:0}
  .sc-sb{flex:1;overflow-y:auto;padding:var(--sp-sm) var(--sp-md)}
  .sc-sb::-webkit-scrollbar{width:2px}.sc-sb::-webkit-scrollbar-track{background:transparent}.sc-sb::-webkit-scrollbar-thumb{background:var(--bda);border-radius:1px}

  /* KPI row for page 2 */
  .sc-kpis{display:flex;gap:var(--sp-xs);flex-shrink:0;margin-bottom:var(--sp-sm)}
  .sc-kpi{flex:1;background:linear-gradient(180deg,rgba(255,255,255,.018) 0%,rgba(255,255,255,.005) 100%);border:1px solid var(--bd);border-radius:4px;padding:var(--sp-sm) var(--sp-md);position:relative;overflow:hidden;min-width:0}
  .sc-kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent)}
  .sc-kpi .kv{font-family:'Space Mono',monospace;font-size:var(--fs-kpi);font-weight:700;line-height:1}
  .sc-kpi .kl{font-size:var(--fs-xs);color:var(--tm);text-transform:uppercase;letter-spacing:.8px;font-weight:500;margin-top:2px}
  .sc-kpi .sc-sub{font-family:'Space Mono',monospace;font-size:var(--fs-xs);color:var(--td);margin-top:2px;display:block;padding:0}

  /* Progress bar */
  .sc-prog{height:clamp(4px,.3vw,8px);background:rgba(255,255,255,.04);border-radius:4px;overflow:hidden;position:relative;margin:var(--sp-xs) 0}
  .sc-prog-fill{height:100%;border-radius:4px;transition:width .6s ease}
  .sc-prog-seg{height:100%;position:absolute;top:0;border-radius:4px;transition:width .6s ease}

  /* Destination grid */
  .sc-dest-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:var(--sp-sm)}
  .sc-dest{background:linear-gradient(180deg,rgba(255,255,255,.015) 0%,rgba(255,255,255,.003) 100%);border:1px solid var(--bd);border-radius:4px;padding:var(--sp-sm);position:relative}
  .sc-dest-name{font-weight:700;font-size:var(--fs-sm);margin-bottom:2px;letter-spacing:.2px}
  .sc-dest-val{font-family:'Space Mono',monospace;font-size:var(--fs-md);font-weight:700;color:var(--ip)}
  .sc-dest-bar{height:2px;background:rgba(255,255,255,.04);border-radius:2px;margin-top:var(--sp-xs)}
  .sc-dest-bar-fill{height:100%;border-radius:2px;background:var(--ip);transition:width .6s ease}

  /* Tables for page 2 */
  .sc-arr{width:100%;border-collapse:collapse}
  .sc-arr th{text-align:left;padding:var(--sp-xs) var(--sp-sm);font-size:var(--fs-xs);text-transform:uppercase;letter-spacing:.5px;color:var(--tm);border-bottom:1px solid var(--bd);font-weight:500;white-space:nowrap}
  .sc-arr td{padding:var(--sp-xs) var(--sp-sm);border-bottom:1px solid rgba(255,255,255,.03);color:var(--td);font-size:var(--fs-xs)}
  .sc-arr .arr-name{color:var(--tx);font-weight:500;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .sc-arr .arr-val{font-family:'Space Mono',monospace;font-weight:700;text-align:right;white-space:nowrap}

  /* Status badges for page 2 */
  .sb-gn{background:rgba(52,211,153,.1);color:#34d399;border:1px solid rgba(52,211,153,.15)}
  .sb-rd{background:rgba(248,113,113,.1);color:#f87171;border:1px solid rgba(248,113,113,.15)}
  .sb-am{background:rgba(251,191,36,.1);color:#fbbf24;border:1px solid rgba(251,191,36,.15)}
  .sb-bl{background:rgba(56,189,248,.1);color:var(--ip);border:1px solid rgba(56,189,248,.15)}
  .sb-or{background:rgba(251,146,60,.1);color:var(--op);border:1px solid rgba(251,146,60,.15)}
</style>
</head>
<body>
<!-- PASSWORD GATE -->
<div id="gate" style="position:fixed;inset:0;background:var(--bg);z-index:3000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px">
  <div style="font-family:'Space Mono',monospace;font-size:clamp(14px,1.2vw,22px);color:var(--ip);font-weight:700;text-shadow:0 0 20px rgba(56,189,248,.3),0 0 60px rgba(56,189,248,.08);letter-spacing:1px">FWC26 Activity Forecast</div>
  <div style="font-size:var(--fs-sm);color:var(--tm);letter-spacing:.5px">Enter password to continue</div>
  <input id="gp" type="password" placeholder="Password" autofocus
    style="font-family:'DM Sans',sans-serif;font-size:var(--fs-md);padding:10px 16px;border-radius:6px;border:1px solid var(--bd);background:rgba(255,255,255,.02);color:var(--tx);outline:none;width:240px;text-align:center;transition:border-color .2s"
    onfocus="this.style.borderColor='rgba(56,189,248,.3)';this.style.boxShadow='0 0 16px rgba(56,189,248,.08)'"
    onblur="this.style.borderColor='var(--bd)';this.style.boxShadow='none'"
    onkeydown="if(event.key==='Enter')chkPw()">
  <button onclick="chkPw()"
    style="font-family:'Space Mono',monospace;font-size:var(--fs-sm);padding:8px 28px;border-radius:5px;border:1px solid rgba(56,189,248,.3);background:linear-gradient(180deg,rgba(56,189,248,.15) 0%,rgba(56,189,248,.05) 100%);color:var(--ip);font-weight:700;cursor:pointer;letter-spacing:.5px;transition:all .15s"
    onmouseover="this.style.background='linear-gradient(180deg,rgba(56,189,248,.25) 0%,rgba(56,189,248,.1) 100%)';this.style.boxShadow='0 0 20px rgba(56,189,248,.12)'"
    onmouseout="this.style.background='linear-gradient(180deg,rgba(56,189,248,.15) 0%,rgba(56,189,248,.05) 100%)';this.style.boxShadow='none'">ENTER</button>

<script>
const SU='https://stwopndhnxcjyomkufii.supabase.co',SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN0d29wbmRobnhjanlvbWt1ZmlpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5MDgyNjgsImV4cCI6MjA4ODQ4NDI2OH0.YNhp7z5kxnzpX15Vw8NVVWaZG1-Lj3Q9uaZDiKmBvf8';

function lg(m){const t=new Date().toLocaleTimeString();dl+=`[${t}] ${m}\n`;const e=document.getElementById('dp');if(e)e.textContent=dl;console.log(m);}

async function init(){

    setInterval(()=>{rc--;const m=Math.floor(rc/60),s=rc%60;document.getElementById('rt').textContent=`${m}:${String(s).padStart(2,'0')}`;if(rc<=0){rc=RS;fa();}},1000);
    const ck=()=>{document.getElementById('ck').textContent=new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'});};ck();setInterval(ck,1000);
    resetPageTimer();
  }catch(e){lg('ERR:'+e.message);lt.textContent='Error: '+e.message;lt.style.color='#f87171';setTimeout(init,5000);}
}

async function fa(){
  const res=await fetch(RU,{headers:{...HD,'Cache-Control':'no-cache','Pragma':'no-cache'},cache:'no-store'});if(!res.ok){lg(`ERR ${res.status}`);return;}
  const data=await res.json();AD={};
  data.forEach(r=>{const k=r.key||r.id;let v=r.value||r.data||r.state;if(typeof v==='string'){try{v=JSON.parse(v)}catch(e){}}AD[k]=v;});
  lg(`${data.length} rows`);go();
}

function t0(){const t=new Date();t.setHours(0,0,0,0);return t;}
function aD(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function fk(d){return d.toISOString().split('T')[0];}
function fd(d){return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});}
function dn(d){return['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()];}
function dL(d){const t=t0(),df=Math.round((d-t)/864e5);return df===0?'Today':df===1?'Tomorrow':['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][d.getDay()];}
function sd(ds,tgt){if(!ds)return!1;const tk=fk(tgt),n=String(ds).includes('T')?String(ds).split('T')[0]:String(ds);if(n===tk)return!0;try{return fk(new Date(ds))===tk}catch(e){return!1}}

function go(){
  let iI=[],oI=[];
  
  // Extract LSR map from lp-truck-state → {truckId: "LSR625-001", ...}
  let lsrMap = {};
  const truckState = AD['lp-truck-state'];
  if(truckState && truckState.lsrNumbers){
    lsrMap = truckState.lsrNumbers;
    lg(`LSR map: ${JSON.stringify(lsrMap).substring(0,400)}`);
  }
  lg(`All DB keys: ${Object.keys(AD).join(', ')}`);
  
  // Keys to skip (config only, not plan or arrivals data)
  const SKIP = new Set(['lp-config','lp-nom','lp-demand','lp-truck-state']);
  
  // Debug: log structure of key data sources
  ['lp-plan','lp-arrivals','fm-rw','fm-nom'].forEach(k => {
    const v = AD[k];
    if(!v) { lg(`  KEY "${k}": not found`); return; }
    if(Array.isArray(v)) {
      lg(`  KEY "${k}": array[${v.length}] sample=${JSON.stringify(v[0]).substring(0,300)}`);
    } else if(typeof v === 'object') {
      lg(`  KEY "${k}": object keys=[${Object.keys(v).slice(0,10).join(',')}] sample=${JSON.stringify(v).substring(0,300)}`);
    } else {
      lg(`  KEY "${k}": ${typeof v} = ${String(v).substring(0,200)}`);
    }
  });
  
  Object.keys(AD).forEach(k=>{
    if(SKIP.has(k)) return;
    const v=AD[k],kl=k.toLowerCase();
    
    // LP plan + arrivals data
    if(k==='lp-plan'||k==='lp-arrivals'||(kl.includes('lp')&&!kl.includes('truck')&&!kl.includes('config')&&!kl.includes('nom')&&!kl.includes('demand'))){
      const items = ex(v,k,'LP');
      lg(`  Extracted ${items.length} items from "${k}"`);
      items.forEach(i=>{
        if(!i.lsr && i.truckId && lsrMap[i.truckId]) i.lsr = lsrMap[i.truckId];
        if(!i.lsr && i.truckId && lsrMap[String(i.truckId)]) i.lsr = lsrMap[String(i.truckId)];
        (i.direction==='outbound'?oI:iI).push(i);
      });
    }
    // FM-RW: LM material plan rows (contains inbound arrivals with dates)
    else if(k==='fm-rw'){
      const items = ex(v,k,'LP');
      lg(`  Extracted ${items.length} items from "fm-rw" (LM data)`);
      items.forEach(i=>{ iI.push(i); }); // fm-rw rows are all inbound arrivals
    }
    // LM dispatch/mile data
    else if((kl.includes('lm')||kl.includes('last mile')||kl.includes('dispatch'))&&!kl.includes('lp')&&k!=='fm-rw'){
      ex(v,k,'LM').forEach(i=>{i.direction='outbound';oI.push(i);});
    }
    // Manual items
    else if(kl.includes('manual')){
      ex(v,k,'MANUAL').forEach(i=>{(i.direction==='outbound'?oI:iI).push(i);});
    }
    // Vision
    else if(kl.includes('v26')||kl.includes('vision')){
      ex(v,k,'V26').forEach(i=>{(i.direction==='outbound'?oI:iI).push(i);});
    }
  });
  
  lg(`${iI.length} in, ${oI.length} out`);
  try{renderSC();}catch(e){lg('SC render err: '+e.message);}
  oI.slice(0,3).forEach(i=>{
    const rawKeys=Object.keys(i._raw||{});
    const lsrFields=rawKeys.filter(k=>k.toUpperCase().includes('LSR'));
    lg(`  OUT: "${i.itemName}" lsr=${i.lsr} venue=${i.venue} rawKeys=[${rawKeys.join(',')}] lsrFields=[${lsrFields.map(k=>k+'='+i._raw[k]).join(',')}]`);
  });

  const td=t0();

  // Helper: find next N active dates from a start offset, noting skipped days
  function findActive(items, count) {
    const slots = [];
    let offset = 0;
    let skippedCount = 0;
    let skippedFirst = null, skippedLast = null;
    while (slots.length < count && offset <= 30) {
      const d = aD(td, offset);
      const dayItems = items.filter(i => sd(i.date, d));
      if (dayItems.length > 0) {
        // Build concise skipped summary
        let skippedNote = null;
        if (skippedCount > 0) {
          if (skippedCount <= 3) {
            // List them: "Today, Tomorrow, Saturday"
            const names = [];
            for (let s = offset - skippedCount; s < offset; s++) names.push(dL(aD(td, s)));
            skippedNote = names.join(', ') + ' — no activity';
          } else {
            // Range: "Mar 12 – Mar 15 — no activity (4 days)"
            skippedNote = `${fd(skippedFirst)} – ${fd(skippedLast)} — no activity`;
          }
        }
        slots.push({ date: d, items: dayItems, sh: offset >= 3, skippedNote });
        skippedCount = 0; skippedFirst = null; skippedLast = null;
      } else {
        if (!skippedFirst) skippedFirst = aD(td, offset);
        skippedLast = aD(td, offset);
        skippedCount++;
      }
      offset++;
    }
    // Pad remaining slots with empty "no upcoming" cards
    while (slots.length < count) {
      const d = aD(td, offset);
      slots.push({ date: d, items: [], sh: true, skippedNote: skippedCount > 0 ? 'No activity in next 30 days' : null });
      offset++;
    }
    return slots;
  }

  const iB = findActive(iI, 4);
  const oF = oI.filter(i => i.lsr);
  const oB = findActive(oF, 4);

  rP('in',iB);rP('out',oB);rK('in',iB);rK('out',oB);
}

function ex(v,sk,src){const it=[];if(!v)return it;if(Array.isArray(v)){v.forEach((e,i)=>{const r=pr(e,sk,src,i);if(r)it.push(r)});return it;}
  if(typeof v==='object'){for(const a of['rows','items','trucks','deliveries','data','entries','loads','shipments']){if(Array.isArray(v[a])){v[a].forEach((e,i)=>{const r=pr(e,sk,src,i);if(r)it.push(r)});return it;}}
  Object.keys(v).forEach(k=>{const s=v[k];if(Array.isArray(s))s.forEach((e,i)=>{const r=pr(e,sk,src,i);if(r)it.push(r)});else if(typeof s==='object'&&s){const r=pr(s,sk,src,k);if(r)it.push(r)}});}return it;}

function pr(e,sk,src,idx){
  if(!e||typeof e!=='object')return null;
  const fv=cs=>{for(const c of cs)for(const k of Object.keys(e))if(k.toLowerCase().includes(c.toLowerCase()))return e[k];return null};
  // Explicit date priority: arrivalDate > date > fuzzy match (avoids _origArrDate / readyDate collision)
  const date=e.arrivalDate||e.date||e.arrival||e.delivery||e.dispatch||fv(['date','arrival','delivery','dispatch','ship','eta','scheduled'])||fv(['day','when']);
  const vendor=fv(['vendor','supplier','carrier','company','from','shipper']);
  const iN=fv(['name','sku','item','material','product','nomenclature','nom']);
  const vR=fv(['venue','destination','site','location','cluster','to','dest']);
  const plt=fv(['pallet','plt']),pcs=fv(['piece','pcs','qty','quantity','units','count']);
  const tid=fv(['truck','truckId','fp','fingerprint']),tp=fv(['type','category','kind','mode']),dir=fv(['direction','flow','dir']);
  let lsr=null;
  for(const k of Object.keys(e)){if(k.toUpperCase()==='LSR'&&e[k]){lsr=e[k];break;}}
  if(!lsr)for(const k of Object.keys(e)){if(k.toLowerCase().includes('lsr')&&e[k]){lsr=e[k];break;}}
  if(!lsr)for(const k of Object.keys(e)){const v=String(e[k]||'');if(/^LSR[\d\-]+/i.test(v)){lsr=v;break;}}
  const cR=fv(['container','shipment','booking','bol','bl','consignment'])||fv(['group','batch','load']);
  const lN=fv(['local','localDelivery','local_name','localName','delivery_name','deliveryName','po','order']);
  const isSC=cR&&/^[A-Z]{3,4}[UJZ]?\d{6,7}$/i.test(String(cR).trim());
  const cont=isSC?String(cR):(lN?String(lN):(cR?String(cR):null));
  const venue=vR?(VM[String(vR).trim()]||String(vR)):null;
  let d2='inbound';
  if(dir)d2=String(dir).toLowerCase().includes('out')?'outbound':'inbound';
  else if(src==='LM')d2='outbound';
  else if(lsr)d2='outbound';
  else if(src==='LP'){if(isSC)d2='inbound';else if(venue&&!cR)d2='outbound';else if(cR)d2='inbound';}
  else if(tp){const t=String(tp).toLowerCase();if(t.includes('dispatch')||t.includes('outbound'))d2='outbound';}
  let bg=src;
  if(tp){const t=String(tp).toLowerCase();if(t.includes('ffe')||t.includes('ff&e'))bg='FF&E';else if(t.includes('cort'))bg='CORT';else if(t.includes('freight'))bg='FREIGHT';else if(t.includes('truck')||t.includes('dispatch'))bg='TRUCK';else if(t.includes('manual'))bg='MANUAL';else bg=String(tp).toUpperCase().substring(0,10);}
  const nm=iN?String(iN):(vendor?String(vendor):`${src} #${idx}`);
  return{date:date?String(date):null,vendor:nm,itemName:nm,venue,pallets:plt?Number(plt):0,pieces:pcs?Number(pcs):0,truckId:tid?String(tid):null,type:bg,direction:d2,source:src,container:cont,lsr:lsr?String(lsr):null,_raw:e};
}

function gI(items){const g={};items.forEach(i=>{const k=i.container||i.venue||i.type||'Other';if(!g[k])g[k]={label:k,type:i.type,venue:i.venue,pallets:0,pieces:0,skus:{},items:[]};const r=g[k];r.pallets+=i.pallets||0;r.pieces+=i.pieces||0;r.items.push(i);const s=i.itemName;if(!r.skus[s])r.skus[s]={name:s,pallets:0,pieces:0,count:0};r.skus[s].pallets+=i.pallets||0;r.skus[s].pieces+=i.pieces||0;r.skus[s].count++;});return Object.values(g);}
function gO(items){const g={};items.forEach(i=>{const k=i.lsr||i.venue||i.truckId||i.type||'Other';if(!g[k])g[k]={label:k,type:i.type,venue:i.venue,lsr:i.lsr,truckId:i.truckId,pallets:0,pieces:0,skus:{},items:[],lsrs:new Set()};const r=g[k];r.pallets+=i.pallets||0;r.pieces+=i.pieces||0;r.items.push(i);if(!r.venue&&i.venue)r.venue=i.venue;
    // Collect LSR from parsed field
    if(i.lsr){r.lsrs.add(String(i.lsr));if(!r.lsr)r.lsr=i.lsr;}
    // Also scan raw entry for any field containing LSR pattern
    if(i._raw&&typeof i._raw==='object'){for(const rk of Object.keys(i._raw)){
      const rv=i._raw[rk];if(rv&&typeof rv==='string'&&/LSR/i.test(rv))r.lsrs.add(rv);
      if(rk.toUpperCase()==='LSR'&&rv)r.lsrs.add(String(rv));
    }}
    const s=i.itemName;if(!r.skus[s])r.skus[s]={name:s,pallets:0,pieces:0,count:0};r.skus[s].pallets+=i.pallets||0;r.skus[s].pieces+=i.pieces||0;r.skus[s].count++;});return Object.values(g);}

function rP(type,bkts){
  const con=document.getElementById(type==='in'?'id':'od');con.innerHTML='';
  const isOut=type==='out';
  bkts.forEach((b,idx)=>{
    const empty=!b.items.length,has=!empty;
    const col=document.createElement('div');
    let cls='dy dy-act';
    const isToday = fk(b.date) === fk(t0());
    if(isToday)cls+=' dy-today';
    if(empty)cls='dy dy-emp';
    col.className=cls;
    const label=dL(b.date);
    const groups=isOut?gO(b.items):gI(b.items);
    // Build skipped days note
    let skippedHtml='';
    if(b.skippedNote){
      skippedHtml=`<div style="font-size:var(--fs-xs);color:var(--tm);margin-top:1px;font-style:italic;opacity:.5">${b.skippedNote}</div>`;
    }
    col.innerHTML=`<div class="dh"><div><div class="dn">${label}${b.sh?` <span style="color:var(--tm);font-size:var(--fs-xs);opacity:.6">↗</span>`:''}</div><div class="dd">${fd(b.date)}</div>${skippedHtml}</div>${has?`<div class="db">${groups.length}</div>`:''}</div><div class="dcc"></div>`;
    con.appendChild(col);
    const cards=col.querySelector('.dcc');
    if(empty)cards.innerHTML=`<div class="emp"><div style="font-size:var(--fs-sm);opacity:.25">—</div><div>No activity</div></div>`;
    else groups.forEach(g=>cards.appendChild(mC(g,type)));
  });
}

function mC(g,pt){
  const c=document.createElement('div');c.className='cd';c.onclick=()=>oM(g);
  const bc=bC(g.type),sk=Object.values(g.skus).sort((a,b)=>b.pieces-a.pieces),t3=sk.slice(0,3);
  // Use pre-collected LSR values from grouping
  const lsrSet=new Set();
  if(g.lsr)lsrSet.add(String(g.lsr));
  if(g.lsrs)g.lsrs.forEach(l=>lsrSet.add(String(l)));
  const lsrArr=[...lsrSet].filter(Boolean);
  const lsrDisplay=lsrArr.join(' · ');
  // Don't show LSR badge if it duplicates the card title
  const labelIsLsr = g.label && lsrArr.length===1 && g.label===lsrArr[0];
  const m=[];
  if(g.pallets)m.push(`<span>PLT <span class="n">${R(g.pallets)}</span></span>`);
  if(g.pieces)m.push(`<span>PCS <span class="n">${Ri(g.pieces)}</span></span>`);
  if(g.truckId)m.push(`<span>TRK <span class="n">${esc(g.truckId)}</span></span>`);
  const lsrHtml=(!labelIsLsr && lsrDisplay)?`<div style="font-family:'Space Mono',monospace;font-size:var(--fs-xs);font-weight:700;color:var(--op);margin-bottom:2px;letter-spacing:.4px;display:inline-block;background:rgba(251,146,60,.06);padding:1px 4px;border-radius:3px;border:1px solid rgba(251,146,60,.12);text-shadow:0 0 8px rgba(251,146,60,.15)">LSR ${esc(lsrDisplay)}</div>`:'';
  let sh=t3.map(s=>`<div class="csl"><span class="csn">${esc(s.name)}</span><span class="csq">${Ri(s.pieces)} pcs</span></div>`).join('');
  if(sk.length>3)sh+=`<div class="csm">+${sk.length-3} more</div>`;
  const venueIsLabel = g.venue && g.label===g.venue;
  c.innerHTML=`<div class="ct"><div class="cv">${esc(g.label)}</div><span class="cb ${bc}">${esc(g.type)}</span></div>${lsrHtml}${m.length?`<div class="cm">${m.join('')}</div>`:''}${(g.venue && !venueIsLabel)?`<div class="cve"><span style="color:var(--tm);opacity:.6">→</span> ${esc(g.venue)}</div>`:''}${sh?`<div class="cs">${sh}</div>`:''}`;
  return c;
}

function bC(t){if(!t)return'b-oth';const l=t.toLowerCase();if(l.includes('cort'))return'b-cort';if(l.includes('ffe')||l.includes('ff&e'))return'b-ffe';if(l.includes('freight'))return'b-frt';if(l.includes('truck'))return'b-trk';if(l.includes('dispatch')||l.includes('lm'))return'b-dsp';if(l.includes('manual'))return'b-man';return'b-oth';}

function rK(type,bkts){
  const el=document.getElementById(type==='in'?'ik':'ok');
  const all=bkts.flatMap(b=>b.items);

}

// ── PAGE ROTATION ──
const PAGE_TITLES=['Dallas Main Logistics Center — Activity Forecast','FF&E Supply Chain Status'];

// ── SUPPLY CHAIN STATUS (Page 2) ──
const DEST_NAMES={TOR:'Toronto',VAN:'Vancouver',CDMX:'Mexico City',GDL:'Guadalajara',MTY:'Monterrey',HOU:'Houston',KC:'Kansas City',NY:'New York'};
const DEST_ORDER=['CDMX','GDL','MTY','TOR','VAN','HOU','KC','NY'];

function renderSC(){
  const plan=AD['lp-plan'],ts=AD['lp-truck-state'],arr=AD['lp-arrivals'],stock=AD['fm-stock'],rw=AD['fm-rw'],nom=AD['lp-nom'],demand=AD['lp-demand'];
  if(!plan||!Array.isArray(plan)){lg('SC: no lp-plan');return;}
  const today=fk(t0());
  const _d3=new Date(t0());_d3.setDate(_d3.getDate()+3);const d3Short=fk(_d3);

  // ── LP truck-state fields (matches LP_loadFromSupabase) ──
  const dispatched=new Set(ts&&ts.dispatched?ts.dispatched:[]);
  const oorSet=new Set(ts&&ts.oorTrucks?ts.oorTrucks:[]);
  const lsrNumbers=ts&&ts.lsrNumbers?ts.lsrNumbers:{};

  // ── Per-truck aggregation (matches digest lines 127-129) ──
  const lpTrucks={};
  for(const r of plan){
    if(!lpTrucks[r.truckId])lpTrucks[r.truckId]={id:r.truckId,date:r.date||'',dest:r.destination||'',plt:0,qty:0};
    lpTrucks[r.truckId].plt+=(r.pallets||0);
    lpTrucks[r.truckId].qty+=(r.qty||0);
  }
  const lpList=Object.values(lpTrucks);
  const lpMaxPlt=26;

  // ── Total demand from materialPlan (matches digest lines 135-140) ──
  const _isTruck=d=>{const u=(d||'').toUpperCase();return u.includes('MEX')||u.includes('CAN')||u.includes('RIC')};
  const _allDemand=(demand&&Array.isArray(demand))? demand.filter(d=>_isTruck(d.destination)):[];
  const lpTotalQty=_allDemand.reduce((s,d)=>s+(d.effQty||0),0);
  const lpTotalPlt=Math.round(_allDemand.reduce((s,d)=>{
    const n=nom&&nom[d.sku];const pq=n?.palletQty||0;const ps=n?.palletSpc||0;
    return s+(pq>0?(d.effQty||0)/pq*ps:0);
  },0));
  const lpTotalTrucks=lpMaxPlt>0?Math.ceil(lpTotalPlt/lpMaxPlt):0;
  const lpTotal=Math.max(lpList.length,lpTotalTrucks);

  // ── LP status classification (EXACT digest logic lines 142-144) ──
  // Dispatched = dispatched set AND has LSR AND date <= today
  // Ready = dispatched set AND has LSR AND date > today (future-locked for shipment)
  // Pending = remainder
  const _isSent=t=>dispatched.has(t.id)&&lsrNumbers[t.id]&&t.date<=today;
  const _isReady=t=>dispatched.has(t.id)&&lsrNumbers[t.id]&&t.date>today;
  const lpDispatched=lpList.filter(t=>_isSent(t)).length;
  const lpReady=lpList.filter(t=>_isReady(t)).length;
  const lpPending=lpTotal-lpDispatched-lpReady;
  const lpPct=lpTotal>0?Math.round(lpDispatched/lpTotal*100):0;
  const rdPct=lpTotal>0?Math.round(lpReady/lpTotal*100):0;

  // ── WHS snapshot from ML3K (pre-computed LM totals, late arrivals) ──
  const snap=AD['whs-snapshot']||{};
  const _lm=snap.lmTotals||{trucks:0,pallets:0,cort:0,cortPcs:0,items:0,dispatched:0};

  // ── LM stats — prefer snapshot, fallback to fm-rw ──
  let lmVenues=snap.venueCount||0;
  let lmItemsUom=snap.lmTotalItems||0;
  const lmTrucks=_lm.trucks;
  const lmPallets=_lm.pallets;
  const lmDisp=_lm.dispatched;
  const lmCort=_lm.cort;
  const lmCortPcs=_lm.cortPcs;
  const stpTrucks=snap.stpTrucks||0;
  const stpQty=snap.stpQty||0;
  const lmPct=lmTrucks>0?Math.round(lmDisp/lmTrucks*100):0;

  // Fallback to fm-rw if no snapshot
  if(!lmItemsUom&&rw){
    const venues=new Set();
    const rows=Array.isArray(rw)?rw:(rw.rows||rw.data||[]);
    if(Array.isArray(rows)){
      rows.forEach(r=>{
        const v=r.Venue||r.venue||r['Venue Name'];
        if(v)venues.add(v);
        lmItemsUom+=(r._effQty||r.Required||r.qty||0);
      });
    }
    if(!lmVenues)lmVenues=venues.size;
  }

  // ── Stock stats ──
  let stockSkus=0,stockTotalQty=0;
  if(stock){
    const skus=stock.skus;
    if(Array.isArray(skus))stockSkus=skus.length;
    else if(skus&&typeof skus==='object')stockSkus=Object.keys(skus).length;
    if(stock.qtys&&typeof stock.qtys==='object'){
      stockTotalQty=Object.values(stock.qtys).reduce((s,v)=>s+(typeof v==='number'?v:0),0);
    }
  }

  // ── Late arrivals — compute directly from LP data ──
  // For each LP truck: check if any SKU's arrival readyDate > truck ship date
  const _arrBySkuDate={};// sku → [{readyDate, qty}] sorted by readyDate
  if(arr&&Array.isArray(arr)){
    arr.forEach(a=>{
      const sk=a.sku||'';if(!sk)return;
      if(!_arrBySkuDate[sk])_arrBySkuDate[sk]=[];
      _arrBySkuDate[sk].push({readyDate:a.readyDate||a.arrivalDate||'',qty:a.qty||0});
    });
    for(const sk in _arrBySkuDate)_arrBySkuDate[sk].sort((a,b)=>(a.readyDate||'').localeCompare(b.readyDate||''));
  }
  // Walk LP trucks: for each SKU, check if arrival readyDate > truck ship date
  const _lateResults=[];
  // Build stock pool for waterfall consumption
  const _stockPool2={};
  if(stock&&stock.qtys){for(const[sk,qt]of Object.entries(stock.qtys)){if(typeof qt==='number')_stockPool2[sk]=qt}}
  // Deep-copy arrivals for FIFO consumption
  const _arrFifo={};
  for(const sk in _arrBySkuDate)_arrFifo[sk]=_arrBySkuDate[sk].map(a=>({...a}));
  // Sort trucks by date for waterfall
  const _trucksSorted=[...lpList].filter(t=>!oorSet.has(t.id)).sort((a,b)=>a.date.localeCompare(b.date));
  for(const t of _trucksSorted){
    if(_isSent(t))continue;
    const tDate=t.date;if(!tDate)continue;
    const skusOnTruck={};
    plan.forEach(r=>{if(String(r.truckId)===String(t.id))skusOnTruck[r.sku||'']=(skusOnTruck[r.sku||'']||0)+(r.qty||0)});
    for(const[sku,qtyNeeded]of Object.entries(skusOnTruck)){
      if(!sku)continue;
      let remaining=qtyNeeded;
      // Consume from stock first
      if(_stockPool2[sku]>0){
        const take=Math.min(remaining,_stockPool2[sku]);
        remaining-=take;_stockPool2[sku]-=take;
      }
      if(remaining<=0)continue;// fully covered by stock
      // FIFO: walk arrivals
      const arrivals=_arrFifo[sku];
      if(!arrivals||!arrivals.length)continue;
      let lastReady=null;
      for(let i=0;i<arrivals.length&&remaining>0;i++){
        const a=arrivals[i];if(a.qty<=0)continue;
        const take=Math.min(remaining,a.qty);
        remaining-=take;a.qty-=take;
        lastReady=a.readyDate;
      }
      if(lastReady&&lastReady>tDate){
        const daysLate=Math.round((new Date(lastReady+'T12:00:00')-new Date(tDate+'T12:00:00'))/864e5);
        if(daysLate>0)_lateResults.push({dest:matchDestName(t.dest),destAbbr:matchDestAbbr(t.dest),sku,truckId:t.id,date:tDate,readyDate:lastReady,daysLate,qty:qtyNeeded});
      }
    }
  }
  // Aggregate late by destination
  const _lateByDest={};
  for(const l of _lateResults){
    const d=l.dest;
    if(!_lateByDest[d])_lateByDest[d]={dest:d,skus:new Set(),trucks:new Set(),qty:0,maxDays:0,items:0};
    _lateByDest[d].skus.add(l.sku);_lateByDest[d].trucks.add(l.truckId);
    _lateByDest[d].qty+=l.qty;_lateByDest[d].items++;
    if(l.daysLate>_lateByDest[d].maxDays)_lateByDest[d].maxDays=l.daysLate;
  }
  const _lpLateByDest=Object.values(_lateByDest).map(d=>({dest:d.dest,skus:d.skus.size,trucks:d.trucks.size,qty:d.qty,maxDays:d.maxDays,items:d.items})).sort((a,b)=>b.maxDays-a.maxDays);
  const _lpLateItems=_lateResults.length;

  // Use snapshot late data if available (more comprehensive — includes LM paths), fallback to LP FIFO
  const _snapHasLate=snap.lateItems>0&&snap.lateByDest&&snap.lateByDest.length>0;
  const lateByDest=_snapHasLate?snap.lateByDest:_lpLateByDest;
  const lateItems=_snapHasLate?snap.lateItems:_lpLateItems;
  const lateSkus=_snapHasLate?snap.lateSkus:[...new Set(_lateResults.map(l=>l.sku))].length;
  const lateTrucks=_snapHasLate?snap.lateTrucks:[...new Set(_lateResults.map(l=>l.truckId))].length;
  const lateMaxDays=_snapHasLate?snap.lateMaxDays:(_lateResults.length>0?Math.max(..._lateResults.map(l=>l.daysLate)):0);
  const _lateSource=_snapHasLate?'snapshot':'live';

  // ── Inbounds (matches digest lines 156-168) ──
  const contMap={};
  if(arr&&Array.isArray(arr)){
    for(const a of arr){
      const key=a.container||a._localName||('Ungrouped-'+(a.arrivalDate||'?'));
      const isLocal=!!a._localName||!a.container;
      if(!contMap[key])contMap[key]={name:a._localName||a.container||'Ungrouped',readyDate:a.readyDate||'—',skuCount:0,skus:{},qty:0,isLocal};
      if(!contMap[key].skus[a.sku]){contMap[key].skus[a.sku]=1;contMap[key].skuCount++}
      contMap[key].qty+=(a.qty||0);
      if(a.readyDate&&a.readyDate<contMap[key].readyDate)contMap[key].readyDate=a.readyDate;
    }
  }
  const allInbounds=Object.values(contMap).sort((a,b)=>(a.readyDate||'').localeCompare(b.readyDate||''));
  const inArrived=allInbounds.filter(c=>c.readyDate<=today);
  const inUpcoming=allInbounds.filter(c=>c.readyDate>today);
  const inUpcoming3d=inUpcoming.filter(c=>c.readyDate<=d3Short);

  // ── Outbounds — ready trucks (matches digest lines 172-176) ──
  const pendingShips=lpList.filter(t=>_isReady(t)).sort((a,b)=>a.date.localeCompare(b.date));
  const nextToShip=pendingShips.filter(t=>t.date<=d3Short);
  const nextToShipDisplay=nextToShip.length>0?nextToShip:pendingShips.slice(0,6);

  // ── Per-destination stats ──
  const destStats={};
  DEST_ORDER.forEach(d=>{destStats[d]={trucks:0,pallets:0,qty:0,dispatched:0,ready:0,oor:0};});
  lpList.forEach(t=>{
    const abbr=matchDestAbbr(t.dest);
    if(!abbr||!destStats[abbr])return;
    const s=destStats[abbr];
    s.trucks++;s.pallets+=t.plt;s.qty+=t.qty;
    if(_isSent(t))s.dispatched++;
    else if(oorSet.has(t.id))s.oor++;
    else if(_isReady(t))s.ready++;
  });

  // ── Kickoff countdown ──
  const daysToKickoff=Math.round((new Date('2026-06-11T12:00:00')-new Date())/86400000);

  // ═══════════════════════════════════
  // ── RENDER ──
  // ═══════════════════════════════════

  // ── Top KPI strip (matches digest Overall: items, venues, trucks, dispatched) ──
  const _allTrucks=lpTotal+lmTrucks+lmCort+stpTrucks;
  document.getElementById('sc-kpis').innerHTML=
    scKpi(daysToKickoff,'Days to Kickoff','#a78bfa','Jun 11')+
    scKpi(Ri(lmItemsUom).toLocaleString(),'Items','#00897B')+
    scKpi(lmVenues||'—','Venues','#a78bfa')+
    scKpi(_allTrucks,'Trucks','var(--ip)')+
    scKpi(lpDispatched,'LP Dispatched','var(--gn)',lpPct+'%')+
    scKpi(lpReady,'LP Ready','#38bdf8')+
    scKpi(lpPending,'LP Pending',lpPending>0?'var(--op)':'var(--gn)');

  // Overall progress bar — LP dispatched + LP ready as fraction of ALL trucks
  const overallDispPct=_allTrucks>0?Math.round(lpDispatched/_allTrucks*100):0;
  const overallRdyPct=_allTrucks>0?Math.round(lpReady/_allTrucks*100):0;
  document.getElementById('sc-prog-overall').innerHTML=
    `<div class="sc-prog-seg" style="width:${overallDispPct}%;background:var(--gn);z-index:2"></div>`+
    `<div class="sc-prog-seg" style="width:${overallDispPct+overallRdyPct}%;background:var(--ip);z-index:1"></div>`;

  // ── LP Section ──
  const lpEl=document.getElementById('sc-lp');
  let lpH=`<div class="sc-kpis" style="">`;
  lpH+=scKpiSm(lpTotal+' trucks',R(lpTotalPlt),'var(--ip)');
  lpH+=scKpiSm('dispatched ('+lpPct+'%)',lpDispatched,'var(--gn)');
  lpH+=scKpiSm('ready',lpReady,'#38bdf8');
  lpH+=scKpiSm('pending',lpPending,'var(--op)');
  lpH+=`</div>`;
  lpH+=`<div class="sc-prog" style=""><div class="sc-prog-seg" style="width:${lpPct}%;background:var(--gn);z-index:2"></div><div class="sc-prog-seg" style="width:${lpPct+rdPct}%;background:var(--ip);z-index:1"></div></div>`;
  lpH+=`<div style="font-size:var(--fs-xs);color:var(--tm);margin-bottom:var(--sp-sm);opacity:.6">${lpPct}% dispatched · ${Ri(lpTotalQty).toLocaleString()} total qty</div>`;
  // Dispatch queue
  if(nextToShipDisplay.length){
    lpH+=`<div style="font-size:var(--fs-xs);color:var(--tm);text-transform:uppercase;letter-spacing:.5px;font-weight:500;margin:var(--sp-sm) 0 var(--sp-xs)">Dispatch Queue</div>`;
    lpH+=`<table class="sc-arr"><tbody>`;
    nextToShipDisplay.forEach(t=>{
      lpH+=_scTruckRow('LP-'+t.id,lsrNumbers[t.id]||'',matchDestName(t.dest),fd(new Date(t.date+'T12:00:00')),R(t.plt),'var(--ip)',false);
    });
    lpH+=`</tbody></table>`;
  }
  // Recently sent
  const sentArr=lpList.filter(t=>_isSent(t)).sort((a,b)=>b.date.localeCompare(a.date)).slice(0,4);
  if(sentArr.length){
    lpH+=`<div style="font-size:var(--fs-xs);color:var(--tm);text-transform:uppercase;letter-spacing:.5px;font-weight:500;margin:var(--sp-sm) 0 var(--sp-xs)">Recently Sent</div>`;
    lpH+=`<table class="sc-arr"><tbody>`;
    sentArr.forEach(t=>{
      lpH+=_scTruckRow('LP-'+t.id,lsrNumbers[t.id]||'',matchDestName(t.dest),'',R(t.plt),'var(--gn)',true);
    });
    lpH+=`</tbody></table>`;
  }
  lpEl.innerHTML=lpH;

  // ── LM Section (matches digest Last Mile: pallets, dispatched, CORT, Staples + kit table) ──
  const lmEl=document.getElementById('sc-lm');
  let lmH=`<div class="sc-kpis" style="">`;
  lmH+=scKpiSm(lmTrucks+' trucks',lmPallets.toLocaleString(),'var(--op)');
  lmH+=scKpiSm('dispatched ('+lmPct+'%)',lmDisp,'var(--gn)');
  lmH+=scKpiSm('CORT',lmCort,'#f87171',lmCortPcs.toLocaleString()+' pcs');
  lmH+=scKpiSm('Staples',stpTrucks,'var(--op)',stpQty.toLocaleString()+' qty');
  lmH+=`</div>`;
  if(lmTrucks>0){
    lmH+=`<div class="sc-prog" style=""><div class="sc-prog-fill" style="width:${lmPct}%;background:var(--op)"></div></div>`;
    lmH+=`<div style="font-size:var(--fs-xs);color:var(--tm);margin-bottom:var(--sp-sm);opacity:.6">${lmPct}% dispatched · ${lmVenues} venues · ${Ri(lmItemsUom).toLocaleString()} items</div>`;
  }
  // Kit totals from fm-lm-kits (direct Supabase)
  const kitsData=AD['fm-lm-kits'];
  let fnKitTotal=0,osKitTotal=0;
  if(kitsData&&Array.isArray(kitsData)){
    kitsData.forEach(k=>{
      if((k.sku||'').startsWith('FNKIT'))fnKitTotal++;
      else if((k.sku||'').startsWith('OSKIT'))osKitTotal++;
    });
  }
  if(fnKitTotal||osKitTotal){
    lmH+=`<div style="display:flex;gap:var(--sp-md);font-size:var(--fs-xs);color:var(--tm);margin-bottom:var(--sp-sm)">`;
    lmH+=`<span style="color:#7db4fc;font-weight:700">🔧 ${fnKitTotal} FF&E kits</span>`;
    lmH+=`<span style="color:#fcd050;font-weight:700">📎 ${osKitTotal} STP kits</span>`;
    lmH+=`</div>`;
  }
  // LM truck table with kit columns from snapshot
  const lmNextTrucks=snap.lmNextTrucks||[];
  if(lmNextTrucks.length){
    lmH+=`<div style="font-size:var(--fs-xs);color:var(--tm);text-transform:uppercase;letter-spacing:.5px;font-weight:500;margin:var(--sp-sm) 0 var(--sp-xs)">Next LM Trucks</div>`;
    lmH+=`<table class="sc-arr"><thead><tr><th>Truck</th><th>Destination</th><th>Date</th><th style="text-align:right">Plt</th><th style="text-align:right;color:#7db4fc">🔧</th><th style="text-align:right;color:#fcd050">📎</th></tr></thead><tbody>`;
    lmNextTrucks.forEach(t=>{
      const dateStr=t.dd?fd(new Date(t.dd+'T12:00:00')):'';
      lmH+=`<tr>`;
      lmH+=`<td style="color:var(--op);font-weight:700;font-family:'Space Mono',monospace">${esc(String(t.id))}</td>`;
      lmH+=`<td class="arr-name" style="max-width:120px">${esc(t.dest)}</td>`;
      lmH+=`<td style="font-family:'Space Mono',monospace;color:var(--tm)">${dateStr}</td>`;
      lmH+=`<td class="arr-val">${R(t.plt)}</td>`;
      lmH+=`<td class="arr-val" style="color:#7db4fc">${t.fn||''}</td>`;
      lmH+=`<td class="arr-val" style="color:#fcd050">${t.os||''}</td>`;
      lmH+=`</tr>`;
    });
    lmH+=`</tbody></table>`;
  }
  lmEl.innerHTML=lmH;

  // ── Arrivals Section (queue + recently arrived, matching LP structure) ──
  const arrEl=document.getElementById('sc-arr');
  let arrH='';
  if(allInbounds.length){
    arrH+=`<div class="sc-kpis" style="">`;
    arrH+=scKpiSm('arrived',inArrived.length,'var(--gn)');
    arrH+=scKpiSm('upcoming',inUpcoming.length,'var(--op)');
    arrH+=scKpiSm('3-day window',inUpcoming3d.length,'var(--ip)');
    arrH+=`</div>`;
    const arrPct=allInbounds.length?Math.round(inArrived.length/allInbounds.length*100):0;
    arrH+=`<div class="sc-prog" style=""><div class="sc-prog-fill" style="width:${arrPct}%;background:var(--gn)"></div></div>`;
    // Arrivals queue (upcoming)
    if(inUpcoming.length){
      arrH+=`<div style="font-size:var(--fs-xs);color:var(--tm);text-transform:uppercase;letter-spacing:.5px;font-weight:500;margin-bottom:var(--sp-xs)">Arrivals Queue</div>`;
      arrH+=`<table class="sc-arr"><thead><tr><th>Source</th><th>Type</th><th>Ready</th><th style="text-align:right">SKUs</th></tr></thead><tbody>`;
      inUpcoming.slice(0,10).forEach(c=>{
        const dateStr=c.readyDate&&c.readyDate!=='—'?fd(new Date(c.readyDate+'T12:00:00')):'—';
        arrH+=`<tr><td class="arr-name">${esc(c.name)}</td>`;
        arrH+=`<td><span class="db ${c.isLocal?'sb-or':'sb-bl'}" style="font-size:var(--fs-xs)">${c.isLocal?'LOCAL':'CONT'}</span></td>`;
        arrH+=`<td style="font-family:'Space Mono',monospace;color:var(--tm)">${dateStr}</td>`;
        arrH+=`<td class="arr-val">${c.skuCount}</td></tr>`;
      });
      arrH+=`</tbody></table>`;
      if(inUpcoming.length>10)arrH+=`<div style="font-size:var(--fs-xs);color:var(--tm);font-style:italic;margin-top:var(--sp-xs)">+${inUpcoming.length-10} more</div>`;
    }
    // Recently arrived
    if(inArrived.length){
      arrH+=`<div style="font-size:var(--fs-xs);color:var(--tm);text-transform:uppercase;letter-spacing:.5px;font-weight:500;margin:var(--sp-sm) 0 var(--sp-xs)">Recently Arrived</div>`;
      arrH+=`<table class="sc-arr"><tbody>`;
      inArrived.slice(-6).reverse().forEach(c=>{
        arrH+=`<tr style="opacity:.5"><td class="arr-name" style="color:var(--gn)">${esc(c.name)}</td>`;
        arrH+=`<td><span class="db sb-gn" style="font-size:var(--fs-xs)">ARRIVED</span></td>`;
        arrH+=`<td></td>`;
        arrH+=`<td class="arr-val">${c.skuCount}</td></tr>`;
      });
      arrH+=`</tbody></table>`;
    }
  } else {
    arrH+=`<div class="emp"><div>No arrival data</div></div>`;
  }
  arrEl.innerHTML=arrH;

  // ── Risk Section ──
  // Primary: snapshot lateByDest (full 3-path Late Engine from ML3K)
  // Secondary: LP FIFO (live, LP-only, limited)
  const riskEl=document.getElementById('sc-risk');
  let riskH='';
  if(lateItems>0){
    riskH+=`<div class="sc-kpis" style="">`;
    riskH+=scKpiSm('items',lateItems,'#f87171');
    riskH+=scKpiSm('SKUs',lateSkus,'#f87171');
    riskH+=scKpiSm('trucks',lateTrucks,'#f87171');
    riskH+=scKpiSm('max','+'+lateMaxDays+'d','#f87171');
    riskH+=`</div>`;
    // Late by destination sorted by maxDays
    riskH+=`<table class="sc-arr"><thead><tr><th style="text-align:left">Destination</th><th>Path</th><th style="text-align:right">SKUs</th><th style="text-align:right">Trk</th><th style="text-align:right">Qty</th><th style="text-align:right">Late</th></tr></thead><tbody>`;
    lateByDest.forEach(d=>{
      const sev=d.maxDays>=10?'#f87171':d.maxDays>=5?'#fb923c':'#fbbf24';
      riskH+=`<tr>`;
      riskH+=`<td class="arr-name" style="text-align:left">${esc(d.dest)}</td>`;
      riskH+=`<td><span class="db ${(d.path||'LP')==='LP'?'sb-bl':'sb-or'}" style="font-size:var(--fs-xs)">${esc(d.path||'LP')}</span></td>`;
      riskH+=`<td class="arr-val">${d.skus}</td>`;
      riskH+=`<td class="arr-val">${d.trucks}</td>`;
      riskH+=`<td class="arr-val">${Ri(d.qty).toLocaleString()}</td>`;
      riskH+=`<td class="arr-val" style="color:${sev};font-weight:700">+${d.maxDays}d</td>`;
      riskH+=`</tr>`;
    });
    riskH+=`</tbody></table>`;
    // Critical SKUs — sorted by impact (daysLate × qty)
    const lateBySku=snap.lateBySku||[];
    if(lateBySku.length){
      riskH+=`<div style="font-size:var(--fs-xs);color:#f87171;text-transform:uppercase;letter-spacing:.5px;font-weight:500;margin:var(--sp-sm) 0 var(--sp-xs)">Critical SKUs · Impact (days × qty)</div>`;
      riskH+=`<table class="sc-arr"><thead><tr><th>SKU</th><th>Name</th><th style="text-align:right">Dests</th><th style="text-align:right">Qty</th><th style="text-align:right">Late</th><th style="text-align:right">Impact</th></tr></thead><tbody>`;
      lateBySku.slice(0,15).forEach(s=>{
        const sev=s.maxDays>=10?'#f87171':s.maxDays>=5?'#fb923c':'#fbbf24';
        riskH+=`<tr>`;
        riskH+=`<td style="font-family:'Space Mono',monospace;font-weight:500;color:var(--tx)">${esc(s.sku)}</td>`;
        riskH+=`<td class="arr-name" style="max-width:120px">${esc(s.name)}</td>`;
        riskH+=`<td class="arr-val">${s.dests}</td>`;
        riskH+=`<td class="arr-val">${Ri(s.qty).toLocaleString()}</td>`;
        riskH+=`<td class="arr-val" style="color:${sev};font-weight:700">+${s.maxDays}d</td>`;
        riskH+=`<td class="arr-val" style="color:${sev};font-weight:700">${Ri(s.impact).toLocaleString()}</td>`;
        riskH+=`</tr>`;
      });
      riskH+=`</tbody></table>`;
    }
    if(snap.ts)riskH+=`<div style="font-size:var(--fs-xs);color:var(--tm);margin-top:var(--sp-xs);opacity:.3">${new Date(snap.ts).toLocaleString()}</div>`;
  } else {
    riskH+=`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:var(--sp-sm)">`;
    riskH+=`<div style="font-family:'Space Mono',monospace;font-size:var(--fs-lg);color:var(--gn);font-weight:700;text-shadow:0 0 16px rgba(52,211,153,.3)">✓</div>`;
    riskH+=`<div style="font-size:var(--fs-sm);color:var(--gn);font-weight:500">No late arrival risks</div>`;
    riskH+=`</div>`;
  }
  riskEl.innerHTML=riskH;

  // ── Destinations Grid ──
  const destEl=document.getElementById('sc-dest');
  let destH='<div class="sc-dest-grid">';
  const maxTrk=Math.max(...DEST_ORDER.map(d=>(destStats[d]||{}).trucks||0),1);
  DEST_ORDER.forEach(abbr=>{
    const s=destStats[abbr]||{trucks:0,pallets:0,qty:0,dispatched:0,ready:0,oor:0};
    const pct=s.trucks?Math.round(s.dispatched/s.trucks*100):0;
    const isInt=['CDMX','GDL','MTY','TOR','VAN'].includes(abbr);
    const borderClr=isInt?'rgba(251,146,60,.18)':'rgba(56,189,248,.18)';
    destH+=`<div class="sc-dest" style="border-bottom:2px solid ${borderClr}">`;
    destH+=`<div style="display:flex;justify-content:space-between;align-items:center">`;
    destH+=`<div class="sc-dest-name" style="color:${isInt?'var(--op)':'var(--ip)'}">${abbr}</div>`;
    destH+=`<span class="db ${pct>=100?'sb-gn':pct>0?'sb-am':'sb-bl'}" style="font-size:var(--fs-xs)">${pct}%</span>`;
    destH+=`</div>`;
    destH+=`<div style="font-size:var(--fs-xs);color:var(--tm);line-height:1.1">${DEST_NAMES[abbr]||abbr}</div>`;
    destH+=`<div class="sc-dest-val">${s.trucks}<span style="font-size:var(--fs-xs);color:var(--tm);font-weight:400;margin-left:2px">trk</span></div>`;
    destH+=`<div style="font-size:var(--fs-xs);color:var(--tm);margin-top:1px;line-height:1.4">`;
    destH+=`${R(s.pallets)}p · ${Ri(s.qty).toLocaleString()}<br>`;
    destH+=`<span style="color:var(--gn)">${s.dispatched}</span> sent`;
    if(s.ready)destH+=` <span style="color:var(--ip)">${s.ready}</span> rdy`;
    if(s.oor)destH+=` <span style="color:#fbbf24">${s.oor}</span> oor`;
    destH+=`</div>`;
    const dispPct=s.trucks?Math.round(s.dispatched/s.trucks*100):0;
    destH+=`<div class="sc-dest-bar"><div class="sc-dest-bar-fill" style="width:${dispPct}%;background:${dispPct>=100?'var(--gn)':dispPct>0?'var(--ip)':'var(--tm)'}"></div></div>`;
    destH+=`</div>`;
  });
  destH+='</div>';
  destEl.innerHTML=destH;
}

function scKpi(val,label,clr,sub){
  return`<div class="sc-kpi"><div class="kv" style="color:${clr};text-shadow:0 0 24px ${clr}33">${val}</div><div class="kl">${label}</div>${sub?`<span class="sc-sub">${sub}</span>`:''}</div>`;
}
function scKpiSm(label,val,clr,sub){
  return`<div class="sc-kpi"><div class="kv" style="font-size:var(--fs-lg);color:${clr};text-shadow:0 0 16px ${clr}33">${val}</div><div class="kl">${label}</div>${sub?`<span class="sc-sub">${sub}</span>`:''}</div>`;
}
function _scTruckRow(tid,lsr,dest,date,plt,clr,dim){
  let h=`<tr${dim?' style="opacity:.5"':''}>`;
  h+=`<td style="color:${clr};font-weight:700;font-family:'Space Mono',monospace">${tid}</td>`;
  h+=`<td style="font-family:'Space Mono',monospace;color:${clr};font-weight:700">${lsr?lsr:''}</td>`;
  h+=`<td class="arr-name" style="max-width:120px">${dest}</td>`;
  h+=`<td style="font-family:'Space Mono',monospace;color:var(--tm)">${date||''}</td>`;
  h+=`<td class="arr-val">${plt}p</td>`;
  h+=`</tr>`;return h;
}

function matchDestAbbr(dest){
  if(!dest)return null;
  const d=String(dest).toUpperCase();
  for(const abbr of DEST_ORDER){
    if(d.includes(abbr))return abbr;
  }
  // Full city name match
  for(const [abbr,name] of Object.entries(DEST_NAMES)){
    if(d.includes(name.toUpperCase()))return abbr;
  }
  return null;
}
function matchDestName(dest){
  const abbr=matchDestAbbr(dest);
  return abbr?DEST_NAMES[abbr]:String(dest||'');
}

// Start only after password gate
if(sessionStorage.getItem('fwc26_auth')==='1'){
  document.getElementById('gate').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('ls').style.display='flex';
  init();
}
</script>
