function HBar(p){
  var max=0;p.data.forEach(function(d){if(d.value>max)max=d.value;});if(!max)max=1;

function Donut(p){
  var total=0;p.data.forEach(function(d){total+=d.value;});if(!total)return null;
  var sz=p.size||80,cx=sz/2,cy=sz/2,r=sz*.42,r2=sz*.24,angle=-90;
  var paths=p.data.map(function(d){
    var sw=Math.max(d.value/total*360,0.5),s=angle*Math.PI/180,en=(angle+sw)*Math.PI/180,lg=sw>180?1:0;
    var x1=cx+r*Math.cos(s),y1=cy+r*Math.sin(s),x2=cx+r*Math.cos(en),y2=cy+r*Math.sin(en);
    var ix1=cx+r2*Math.cos(en),iy1=cy+r2*Math.sin(en),ix2=cx+r2*Math.cos(s),iy2=cy+r2*Math.sin(s);
    angle+=sw;return{d:"M "+x1+" "+y1+" A "+r+" "+r+" 0 "+lg+" 1 "+x2+" "+y2+" L "+ix1+" "+iy1+" A "+r2+" "+r2+" 0 "+lg+" 0 "+ix2+" "+iy2+" Z",color:d.color};
  });
  return e("svg",{viewBox:"0 0 "+sz+" "+sz,style:{width:"100%",maxWidth:sz,height:"auto"}},paths.map(function(pp,i){return e("path",{key:i,d:pp.d,fill:pp.color,opacity:.85});}),e("text",{x:cx,y:cy-1,textAnchor:"middle",fill:TX,fontSize:sz*.14,fontWeight:800,fontFamily:"monospace"},p.center),e("text",{x:cx,y:cy+sz*.1,textAnchor:"middle",fill:TM,fontSize:sz*.07},p.sub||""));
}

/* Days in Stock - SVG based for reliable rendering */
function DaysChart(p){
  var ref=useRef(null);
  var _s=useState({w:200,h:150}),sz=_s[0],setSz=_s[1];
  useEffect(function(){
    if(!ref.current)return;
    function m(){var r=ref.current.getBoundingClientRect();setSz({w:Math.round(r.width),h:Math.round(r.height)});}
    m();window.addEventListener("resize",m);return function(){window.removeEventListener("resize",m);};
  },[]);
  var data=p.data;
  var max=0;data.forEach(function(d){if(d.value>max)max=d.value;});if(!max)max=1;
  var cols=[GR,TEAL,BL,AM,RD];
  var W=sz.w,H=sz.h,padB=16,padT=18,chartH=H-padB-padT;
  var gap=Math.max(Math.floor(W*0.08),4);
  var barW=Math.max(Math.floor((W-gap*(data.length+1))/data.length),10);
  var bars=[];
  data.forEach(function(d,i){
    var x=gap+i*(barW+gap);
    var bh=Math.max(Math.round((d.value/max)*chartH),3);
    var y=padT+chartH-bh;
    bars.push(e("rect",{key:"b"+i,x:x,y:y,width:barW,height:bh,fill:cols[i],rx:3,opacity:.8}));
    bars.push(e("text",{key:"v"+i,x:x+barW/2,y:y-4,textAnchor:"middle",fill:cols[i],fontSize:Math.min(W*.07,11),fontWeight:700,fontFamily:"monospace"},d.value));
    bars.push(e("text",{key:"l"+i,x:x+barW/2,y:H-2,textAnchor:"middle",fill:TM,fontSize:Math.min(W*.055,9)},d.label));
  });
  return e("div",{ref:ref,style:{width:"100%",height:"100%"}},
    e("svg",{width:W,height:H,viewBox:"0 0 "+W+" "+H},
      e("line",{x1:0,y1:padT+chartH,x2:W,y2:padT+chartH,stroke:BD,strokeWidth:1}),
      bars
    )
  );
}

function Box(p){
  return e("div",{style:Object.assign({background:S1,border:"1px solid "+BD,borderRadius:8,padding:"0.5vh 0.6vw",display:"flex",flexDirection:"column",overflow:"hidden"},p.style||{})},

          else if(isNomen){newNomen=rows.map(function(r){return{code:r["Nomenclature code"],name:r["Nomenclature name"],type:r["Nomenclature type"],price:r["Item price, USD"]||0,source:r["Source"],country:r["Country of origin"]};});newFn.n=file.name;}
        }catch(err){console.error(err);}
        finish();

    });ev.target.value="";
  }

  var st=useMemo(function(){
    if(!stock||!stock.length)return null;
    var priceMap={},typeMap={};
    if(nomen){nomen.forEach(function(n){if(n.code){priceMap[n.code]=n.price||0;typeMap[n.code]=n.type||"Unknown";}});}

    topItems.sort(function(a,b){return b.value-a.value;});
    var mk=function(obj,color){return Object.entries(obj).map(function(en){return{name:en[0].length>18?en[0].slice(0,16)+"..":en[0],fullName:en[0],value:en[1],color:color?color[en[0]]||TD:TD};}).sort(function(a,b){return b.value-a.value;});};

  },[stock,nomen]);

  var has=stock&&stock.length>0&&st;

                    e("td",{style:{padding:"0.25vh 0.3vw",fontFamily:"monospace",color:CYAN,fontWeight:600}},fmtN(t.stock)),
                    st.hasN?e("td",{style:{padding:"0.25vh 0.3vw",fontFamily:"monospace",color:TD}},t.price?"$"+Number(t.price).toLocaleString():"-"):e("td",{style:{padding:"0.25vh 0.3vw",color:TD}},t.uom||"-"),
                    st.hasN?e("td",{style:{padding:"0.25vh 0.3vw",fontFamily:"monospace",color:GD,fontWeight:700}},t.value?fmt$(t.value):"-"):e("td",{style:{padding:"0.25vh 0.3vw",fontFamily:"monospace",color:PU}},t.days!=null?t.days+"d":"-")
                  );
                }))
              )
            )
          ),

          /* Right sidebar: Reserved + Category */
          e("div",{style:{display:"flex",flexDirection:"column",gap:"0.35vw",minHeight:0}},

            e(Box,{title:e("span",{style:{display:"flex",alignItems:"center",gap:4}},e("span",{style:{width:5,height:5,borderRadius:"50%",background:AM,display:"inline-block",animation:"pulse 2s infinite"}}),"Reserved ("+st.reservedItems.length+")"),style:{flex:3}},
              st.reservedItems.length>0?e("div",{style:{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:"0.3vh"}},
                st.reservedItems.map(function(r,i){
                  return e("div",{key:i,style:{display:"flex",alignItems:"center",gap:"0.3vw",padding:"0.25vh 0.3vw",background:S2,borderRadius:4,border:"1px solid "+BD}},
                    e("span",{style:{fontFamily:"monospace",fontWeight:700,color:AM,fontSize:"min(0.6vw,10px)",flexShrink:0,minWidth:"1.5vw",textAlign:"right"}},r.reserve),
                    e("div",{style:{flex:1,minWidth:0}},
                      e("div",{style:{fontSize:"min(0.48vw,8px)",color:TX,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}},r.name),
                      e("div",{style:{fontSize:"min(0.38vw,6px)",color:TM}},r.owner)
                    )
                  );
                })
              ):e("div",{style:{color:TM,fontSize:"min(0.5vw,8px)",textAlign:"center",paddingTop:"1vh"}},"None")
            ),

            st.hasN?e(Box,{title:"By Category",style:{flex:2}},
              e("div",{style:{flex:1,display:"flex",flexDirection:"column",justifyContent:"center",gap:"0.4vh"}},
                Object.entries(st.byNomType).filter(function(en){return en[0]!=="Unknown";}).map(function(en,i){
                  var col=[TEAL,BL,PU][i%3];
                  return e("div",{key:en[0],style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"0.5vh 0.4vw",background:S2,borderRadius:5,border:"1px solid "+BD}},
                    e("div",null,
                      e("div",{style:{fontSize:"min(0.55vw,9px)",color:col,fontWeight:700}},en[0]),
                      e("div",{style:{fontSize:"min(0.42vw,7px)",color:TM}},fmtN(en[1])+" units")
                    ),
                    e("div",{style:{fontFamily:"monospace",fontSize:"min(0.6vw,10px)",fontWeight:800,color:col}},fmt$(st.byNomTypeVal[en[0]]||0))
                  );
                })
              )
            ):null
          )
        )
      ):null
    ),

    e("footer",{style:{padding:"0.25vh 1vw",borderTop:"1px solid "+BD,display:"flex",justifyContent:"space-between",fontSize:"min(0.45vw,7px)",color:TM,flexShrink:0}},
      e("span",null,"Warehouse Inventory Dashboard v1.0"),
      e("span",null,sbOk?"\u25CF Supabase Connected (inventory_state)":"\u25CB Connecting..."),
      e("span",null,clock.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"}))
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(e(App));
})();
</script>
