<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA WC2026 — 3-Day Forecast Dashboard</title>
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>

  if (!window.supabase) {
    document.write('<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"><\/script>');
  }

<script>
  if (!window.supabase) {
    document.write('<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"><\/script>');
  }
</script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,300&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0a0e17;
    --surface: #111827;
    --surface-hover: #1a2235;
    --border: #1e293b;
    --border-accent: #334155;
    --text: #e2e8f0;
    --text-dim: #94a3b8;
    --text-muted: #64748b;
    --inbound-primary: #22d3ee;
    --inbound-glow: #22d3ee33;
    --inbound-bg: #0e2a30;
    --outbound-primary: #f97316;
    --outbound-glow: #f9731633;
    --outbound-bg: #2a1a0e;
    --accent-green: #4ade80;
    --accent-red: #f87171;
    --accent-yellow: #fbbf24;
    --kpi-bg: rgba(255,255,255,0.04);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  /* ── Top Bar ── */
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    height: 52px;
    flex-shrink: 0;
  }
  .topbar-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .topbar-logo {
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: 16px;
    color: var(--inbound-primary);
    letter-spacing: -0.5px;
  }
  .topbar-title {
    font-size: 13px;
    color: var(--text-dim);
    font-weight: 300;
  }
  .topbar-right {
    display: flex;
    align-items: center;
    gap: 16px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
  }
  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent-green);
    display: inline-block;
    animation: pulse-dot 2s infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .refresh-timer {
    color: var(--text-muted);
  }

  /* ── Main Layout ── */
  .main {
    display: flex;
    height: calc(100vh - 52px);
  }
  .panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .panel-inbound {
    border-right: 2px solid var(--border);
  }

  /* ── Panel Header ── */
  .panel-header {
    padding: 14px 20px 10px;
    flex-shrink: 0;
  }
  .panel-label {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .panel-inbound .panel-label {
    color: var(--inbound-primary);
  }
  .panel-outbound .panel-label {
    color: var(--outbound-primary);
  }
  .panel-label-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── KPI Strip ── */
  .kpi-strip {
    display: flex;
    gap: 8px;
    padding: 0 20px 12px;
    flex-shrink: 0;
  }
  .kpi-card {
    flex: 1;
    background: var(--kpi-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .kpi-value {
    font-family: 'Space Mono', monospace;
    font-size: 22px;
    font-weight: 700;
    line-height: 1;
  }
  .panel-inbound .kpi-value { color: var(--inbound-primary); }
  .panel-outbound .kpi-value { color: var(--outbound-primary); }
  .kpi-label {
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 500;
  }

  /* ── Day Columns ── */
  .days-container {
    display: flex;
    flex: 1;
    overflow: hidden;
    padding: 0 12px 12px;
    gap: 8px;
  }
  .day-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--border);
    background: var(--surface);
  }
  .day-header {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }
  .day-name {
    font-weight: 700;
    font-size: 14px;
  }
  .day-date {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
  }
  .day-today .day-header {
    background: rgba(34, 211, 238, 0.06);
  }
  .panel-outbound .day-today .day-header {
    background: rgba(249, 115, 22, 0.06);
  }
  .day-badge {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: 700;
  }
  .panel-inbound .day-badge {
    background: var(--inbound-glow);
    color: var(--inbound-primary);
  }
  .panel-outbound .day-badge {
    background: var(--outbound-glow);
    color: var(--outbound-primary);
  }

  .day-cards {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .day-cards::-webkit-scrollbar { width: 4px; }
  .day-cards::-webkit-scrollbar-track { background: transparent; }
  .day-cards::-webkit-scrollbar-thumb { background: var(--border-accent); border-radius: 4px; }

  .day-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    color: var(--text-muted);
    font-size: 13px;
    gap: 4px;
    opacity: 0.6;
  }
  .day-empty-icon { font-size: 28px; opacity: 0.4; }

  /* ── Delivery Cards ── */
  .card {
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    cursor: pointer;
    transition: all 0.15s ease;
    position: relative;
  }
  .card:hover {
    background: var(--surface-hover);
    border-color: var(--border-accent);
    transform: translateY(-1px);
  }
  .panel-inbound .card:hover {
    border-color: rgba(34, 211, 238, 0.3);
    box-shadow: 0 2px 12px var(--inbound-glow);
  }
  .panel-outbound .card:hover {
    border-color: rgba(249, 115, 22, 0.3);
    box-shadow: 0 2px 12px var(--outbound-glow);
  }
  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 6px;
  }
  .card-vendor {
    font-weight: 700;
    font-size: 13px;
    line-height: 1.2;
    max-width: 70%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .card-type-badge {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 3px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    flex-shrink: 0;
  }
  .badge-ffe { background: #1e3a5f; color: #60a5fa; }
  .badge-cort { background: #3b1f4e; color: #c084fc; }
  .badge-freight { background: #1a3329; color: #4ade80; }
  .badge-truck { background: #3a2510; color: #fbbf24; }
  .badge-dispatch { background: #3a1510; color: #f97316; }
  .badge-manual { background: #2d1a3e; color: #e879f9; }
  .badge-other { background: #1e293b; color: #94a3b8; }

  .card-meta {
    display: flex;
    gap: 12px;
    font-size: 11px;
    color: var(--text-muted);
  }
  .card-meta span {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .card-meta .num {
    font-family: 'Space Mono', monospace;
    color: var(--text-dim);
    font-weight: 700;
  }
  .card-venue {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 4px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* ── Modal ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border-accent);
    border-radius: 14px;
    width: 90%;
    max-width: 620px;
    max-height: 80vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 24px 80px rgba(0,0,0,0.5);
  }
  .modal-header {
    padding: 18px 22px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .modal-header h2 {
    font-size: 17px;
    font-weight: 700;
  }
  .modal-close {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    width: 32px;
    height: 32px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .modal-close:hover {
    background: var(--surface-hover);
    color: var(--text);
  }
  .modal-body {
    padding: 18px 22px;
    overflow-y: auto;
    flex: 1;
  }
  .modal-kpi-row {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
  }
  .modal-kpi {
    flex: 1;
    background: var(--kpi-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    text-align: center;
  }
  .modal-kpi .num {
    font-family: 'Space Mono', monospace;
    font-size: 20px;
    font-weight: 700;
    color: var(--inbound-primary);
  }
  .modal-kpi .label {
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .modal-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  .modal-table th {
    text-align: left;
    padding: 8px 10px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
    font-weight: 500;
  }
  .modal-table td {
    padding: 7px 10px;
    border-bottom: 1px solid var(--border);
    color: var(--text-dim);
  }
  .modal-table tr:last-child td { border-bottom: none; }
  .modal-table .td-name {
    color: var(--text);
    font-weight: 500;
    max-width: 260px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .modal-table .td-num {
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    text-align: right;
  }

  /* ── Loading / Discovery ── */
  .loading-screen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 2000;
    gap: 16px;
    transition: opacity 0.4s;
  }
  .loading-screen.hide {
    opacity: 0;
    pointer-events: none;
  }
  .loading-spinner {
    width: 40px;
    height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--inbound-primary);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
  }

  /* ── Debug Panel (togglable) ── */
  .debug-toggle {
    position: fixed;
    bottom: 10px;
    right: 10px;
    z-index: 900;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    padding: 4px 10px;
    border-radius: 4px;
    cursor: pointer;
  }
  .debug-panel {
    display: none;
    position: fixed;
    bottom: 40px;
    right: 10px;
    width: 500px;
    max-height: 50vh;
    background: var(--surface);
    border: 1px solid var(--border-accent);
    border-radius: 8px;
    z-index: 900;
    overflow: auto;
    padding: 12px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    white-space: pre-wrap;
    word-break: break-all;
  }
  .debug-panel.active { display: block; }
</style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
  <div class="loading-spinner"></div>
  <div class="loading-text">Connecting to Supabase...</div>
</div>

<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-logo">WC2026 FORECAST</div>
    <div class="topbar-title">Dallas Main Logistics Center — 3-Day Activity View</div>
  </div>
  <div class="topbar-right">
    <span><span class="status-dot"></span> LIVE</span>
    <span class="refresh-timer" id="refreshTimer">Next refresh: 30s</span>
    <span id="clockDisplay"></span>
  </div>
</div>

<div class="main">
  <!-- INBOUND PANEL -->
  <div class="panel panel-inbound">
    <div class="panel-header">
      <div class="panel-label">
        ▼ Inbound
        <span class="panel-label-line"></span>
      </div>
    </div>
    <div class="kpi-strip" id="inboundKpis"></div>
    <div class="days-container" id="inboundDays"></div>
  </div>

  <!-- OUTBOUND PANEL -->
  <div class="panel panel-outbound">
    <div class="panel-header">
      <div class="panel-label">
        ▲ Outbound
        <span class="panel-label-line"></span>
      </div>
    </div>
    <div class="kpi-strip" id="outboundKpis"></div>
    <div class="days-container" id="outboundDays"></div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h2 id="modalTitle">Delivery Details</h2>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<button class="debug-toggle" onclick="toggleDebug()">DEBUG</button>
<div class="debug-panel" id="debugPanel"></div>

<script>
// ════════════════════════════════════════════════
// CONFIG
// ════════════════════════════════════════════════
const SUPABASE_URL = 'https://stwopndhnxcjyomkufii.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN0d29wbmRobnhjanlvbWt1ZmlpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5MDgyNjgsImV4cCI6MjA4ODQ4NDI2OH0.YNhp7z5kxnzpX15Vw8NVVWaZG1-Lj3Q9uaZDiKmBvf8';
const REFRESH_INTERVAL = 30; // seconds
const TABLE = 'shared_state';

let supabase;
let allData = {};
let refreshCountdown = REFRESH_INTERVAL;
let debugLog = '';

function log(msg) {
  const ts = new Date().toLocaleTimeString();
  debugLog += `[${ts}] ${msg}\n`;
  const el = document.getElementById('debugPanel');
  if (el) el.textContent = debugLog;
  console.log(msg);
}

function toggleDebug() {
  document.getElementById('debugPanel').classList.toggle('active');
}

// ════════════════════════════════════════════════
// INIT SUPABASE
// ════════════════════════════════════════════════
async function init() {
  const loadingText = document.querySelector('.loading-text');
  try {
    // Detect supabase global
    const sb = window.supabase;
    if (!sb || !sb.createClient) {
      loadingText.textContent = 'ERROR: Supabase library failed to load';
      log('ERROR: window.supabase not found. Keys: ' + Object.keys(window).filter(k => k.toLowerCase().includes('supa')));
      setTimeout(init, 5000);
      return;
    }

    const rawClient = sb.createClient(SUPABASE_URL, SUPABASE_KEY);
    // READ-ONLY SAFEGUARD: wrap client to only allow .select()
    const originalFrom = rawClient.from.bind(rawClient);
    rawClient.from = function(table) {
      const query = originalFrom(table);
      query.insert = () => { throw new Error('BLOCKED: Dashboard is read-only'); };
      query.update = () => { throw new Error('BLOCKED: Dashboard is read-only'); };
      query.upsert = () => { throw new Error('BLOCKED: Dashboard is read-only'); };
      query.delete = () => { throw new Error('BLOCKED: Dashboard is read-only'); };
      return query;
    };
    supabase = rawClient;
    log('Supabase client initialized (READ-ONLY mode)');

    loadingText.textContent = 'Fetching data...';
    await fetchAllData();
    document.getElementById('loadingScreen').classList.add('hide');
    startRefreshLoop();
    startClock();
  } catch (err) {
    log('INIT ERROR: ' + err.message);
    loadingText.textContent = 'Error: ' + err.message + ' — retrying in 5s...';
    loadingText.style.color = '#f87171';
    setTimeout(init, 5000);
  }
}

// ════════════════════════════════════════════════
// DATA FETCHING
// ════════════════════════════════════════════════
async function fetchAllData() {
  log('Fetching shared_state...');
  const { data, error } = await supabase.from(TABLE).select('*');
  if (error) {
    log('FETCH ERROR: ' + error.message);
    return;
  }
  log(`Fetched ${data.length} rows. Keys: ${data.map(r => r.key || r.id).join(', ')}`);

  allData = {};
  data.forEach(row => {
    const key = row.key || row.id;
    let val = row.value || row.data || row.state;
    if (typeof val === 'string') {
      try { val = JSON.parse(val); } catch(e) {}
    }
    allData[key] = val;
    log(`  Key "${key}": ${typeof val === 'object' ? JSON.stringify(val).substring(0, 200) + '...' : String(val).substring(0, 200)}`);
  });

  processAndRender();
}

// ════════════════════════════════════════════════
// DATE HELPERS
// ════════════════════════════════════════════════
function getTargetDates() {
  const today = new Date();
  const dates = [];
  for (let i = 0; i < 3; i++) {
    const d = new Date(today);
    d.setDate(d.getDate() + i);
    dates.push(d);
  }
  return dates;
}

function formatDateKey(d) {
  return d.toISOString().split('T')[0]; // YYYY-MM-DD
}

function formatDateDisplay(d) {
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function getDayLabel(d, idx) {
  if (idx === 0) return 'Today';
  if (idx === 1) return 'Tomorrow';
  return d.toLocaleDateString('en-US', { weekday: 'long' });
}

function isSameDay(dateStr, targetDate) {
  if (!dateStr) return false;
  const target = formatDateKey(targetDate);
  // Handle multiple date formats
  const normalized = dateStr.includes('T') ? dateStr.split('T')[0] : dateStr;
  // Try direct match
  if (normalized === target) return true;
  // Try parsing
  try {
    const parsed = new Date(dateStr);
    return formatDateKey(parsed) === target;
  } catch(e) { return false; }
}

// ════════════════════════════════════════════════
// DATA PARSING — ADAPTIVE
// ════════════════════════════════════════════════
function processAndRender() {
  const dates = getTargetDates();
  let inboundItems = [];
  let outboundItems = [];

  // Scan all keys for LP (Load Plan) and LM (Last Mile) data
  Object.keys(allData).forEach(key => {
    const val = allData[key];
    const keyLower = key.toLowerCase();

    // ── LP data → inbound arrivals + outbound ──
    if (keyLower.includes('lp') || keyLower.includes('load') || keyLower.includes('plan')) {
      const parsed = extractDeliveries(val, key, 'LP');
      parsed.forEach(item => {
        if (item.direction === 'outbound') {
          outboundItems.push(item);
        } else {
          inboundItems.push(item);
        }
      });
    }

    // ── LM data → outbound dispatches ──
    if (keyLower.includes('lm') || keyLower.includes('last') || keyLower.includes('mile') || keyLower.includes('dispatch') || keyLower.includes('truck')) {
      const parsed = extractDeliveries(val, key, 'LM');
      parsed.forEach(item => {
        item.direction = 'outbound';
        outboundItems.push(item);
      });
    }

    // ── Manual items ──
    if (keyLower.includes('manual')) {
      const parsed = extractDeliveries(val, key, 'MANUAL');
      parsed.forEach(item => {
        if (item.direction === 'outbound') outboundItems.push(item);
        else inboundItems.push(item);
      });
    }

    // ── Vision / V26 data ──
    if (keyLower.includes('v26') || keyLower.includes('vision')) {
      const parsed = extractDeliveries(val, key, 'V26');
      parsed.forEach(item => {
        if (item.direction === 'outbound') outboundItems.push(item);
        else inboundItems.push(item);
      });
    }
  });

  log(`Parsed: ${inboundItems.length} inbound, ${outboundItems.length} outbound items`);

  // Bucket by date
  const inboundByDay = bucketByDay(inboundItems, dates);
  const outboundByDay = bucketByDay(outboundItems, dates);

  // Handle "if nothing planned, show next day" logic
  const finalInbound = shiftEmptyDays(inboundByDay, dates, inboundItems);
  const finalOutbound = shiftEmptyDays(outboundByDay, dates, outboundItems);

  renderPanel('inbound', finalInbound);
  renderPanel('outbound', finalOutbound);
  renderKpis('inbound', finalInbound);
  renderKpis('outbound', finalOutbound);
}

function extractDeliveries(val, sourceKey, source) {
  const items = [];
  if (!val) return items;

  // If it's an array, iterate
  if (Array.isArray(val)) {
    val.forEach((entry, i) => {
      const item = parseEntry(entry, sourceKey, source, i);
      if (item) items.push(item);
    });
    return items;
  }

  // If it's an object with nested arrays or objects
  if (typeof val === 'object') {
    // Check if it has rows/items/trucks/deliveries arrays
    const arrayKeys = ['rows', 'items', 'trucks', 'deliveries', 'data', 'entries', 'loads', 'shipments'];
    for (const ak of arrayKeys) {
      if (Array.isArray(val[ak])) {
        val[ak].forEach((entry, i) => {
          const item = parseEntry(entry, sourceKey, source, i);
          if (item) items.push(item);
        });
        return items;
      }
    }
    // Check if keys look like dates or indices
    Object.keys(val).forEach(k => {
      const sub = val[k];
      if (Array.isArray(sub)) {
        sub.forEach((entry, i) => {
          const item = parseEntry(entry, sourceKey, source, i);
          if (item) items.push(item);
        });
      } else if (typeof sub === 'object' && sub !== null) {
        const item = parseEntry(sub, sourceKey, source, k);
        if (item) items.push(item);
      }
    });
  }
  return items;
}

function parseEntry(entry, sourceKey, source, idx) {
  if (!entry || typeof entry !== 'object') return null;

  // Adaptive field detection
  const findField = (candidates) => {
    for (const c of candidates) {
      for (const k of Object.keys(entry)) {
        if (k.toLowerCase().includes(c.toLowerCase())) return entry[k];
      }
    }
    return null;
  };

  const date = findField(['date', 'arrival', 'delivery', 'dispatch', 'ship', 'eta', 'scheduled']) 
    || findField(['day', 'when']);
  const vendor = findField(['vendor', 'supplier', 'carrier', 'company', 'from', 'shipper', 'name', 'source'])
    || findField(['title', 'label', 'description']);
  const venue = findField(['venue', 'destination', 'site', 'location', 'cluster', 'to', 'dest']);
  const pallets = findField(['pallet', 'plt']);
  const pieces = findField(['piece', 'pcs', 'qty', 'quantity', 'units', 'count']);
  const truckId = findField(['truck', 'truckId', 'fp', 'fingerprint', 'id']);
  const type = findField(['type', 'category', 'kind', 'mode']);
  const direction = findField(['direction', 'flow', 'dir']);

  // Determine direction
  let dir = 'inbound';
  if (direction) {
    dir = String(direction).toLowerCase().includes('out') ? 'outbound' : 'inbound';
  } else if (source === 'LM') {
    dir = 'outbound';
  } else if (type) {
    const t = String(type).toLowerCase();
    if (t.includes('dispatch') || t.includes('outbound') || t.includes('ship out')) dir = 'outbound';
  }

  // Determine type badge
  let typeBadge = source;
  if (type) {
    const t = String(type).toLowerCase();
    if (t.includes('ffe') || t.includes('ff&e')) typeBadge = 'FF&E';
    else if (t.includes('cort')) typeBadge = 'CORT';
    else if (t.includes('freight')) typeBadge = 'FREIGHT';
    else if (t.includes('truck') || t.includes('dispatch')) typeBadge = 'TRUCK';
    else if (t.includes('manual')) typeBadge = 'MANUAL';
    else typeBadge = String(type).toUpperCase().substring(0, 10);
  }

  // Extract material items for modal
  let materials = [];
  if (entry.items && Array.isArray(entry.items)) {
    materials = entry.items.map(it => ({
      name: it.name || it.description || it.item || it.material || '—',
      qty: it.qty || it.quantity || it.count || it.pcs || it.pieces || 0,
      unit: it.unit || 'pcs'
    }));
  } else if (entry.materials && Array.isArray(entry.materials)) {
    materials = entry.materials.map(it => ({
      name: it.name || it.description || '—',
      qty: it.qty || it.quantity || 0,
      unit: it.unit || 'pcs'
    }));
  }

  return {
    date: date ? String(date) : null,
    vendor: vendor ? String(vendor) : `${source} #${idx}`,
    venue: venue ? String(venue) : null,
    pallets: pallets ? Number(pallets) : 0,
    pieces: pieces ? Number(pieces) : 0,
    truckId: truckId ? String(truckId) : null,
    type: typeBadge,
    direction: dir,
    source,
    materials,
    _raw: entry
  };
}

function bucketByDay(items, dates) {
  return dates.map((d, idx) => ({
    date: d,
    idx,
    items: items.filter(item => isSameDay(item.date, d))
  }));
}

function shiftEmptyDays(dayBuckets, dates, allItems) {
  // If a day is empty, try to show the next available day with data
  const result = [...dayBuckets];
  for (let i = 0; i < result.length; i++) {
    if (result[i].items.length === 0) {
      // Look ahead for next day with data (up to 7 days out)
      for (let offset = 1; offset <= 7; offset++) {
        const futureDate = new Date(dates[0]);
        futureDate.setDate(futureDate.getDate() + i + offset);
        const futureItems = allItems.filter(item => isSameDay(item.date, futureDate));
        if (futureItems.length > 0) {
          result[i] = {
            date: futureDate,
            idx: i,
            items: futureItems,
            shifted: true,
            shiftedFrom: dates[i]
          };
          break;
        }
      }
    }
  }
  return result;
}

// ════════════════════════════════════════════════
// RENDERING
// ════════════════════════════════════════════════
function renderPanel(type, dayBuckets) {
  const container = document.getElementById(type === 'inbound' ? 'inboundDays' : 'outboundDays');
  container.innerHTML = '';

  dayBuckets.forEach((bucket, idx) => {
    const col = document.createElement('div');
    col.className = 'day-col' + (idx === 0 && !bucket.shifted ? ' day-today' : '');

    const label = bucket.shifted
      ? getDayLabel(bucket.date, -1)
      : getDayLabel(bucket.date, idx);
    const dateStr = formatDateDisplay(bucket.date);
    const count = bucket.items.length;

    col.innerHTML = `
      <div class="day-header">
        <div>
          <div class="day-name">${label}${bucket.shifted ? ' *' : ''}</div>
          <div class="day-date">${dateStr}</div>
        </div>
        <div class="day-badge">${count} ${type === 'inbound' ? 'arrival' : 'dispatch'}${count !== 1 ? 's' : ''}</div>
      </div>
      <div class="day-cards" id="${type}-day-${idx}"></div>
    `;
    container.appendChild(col);

    const cardsEl = col.querySelector('.day-cards');
    if (count === 0) {
      cardsEl.innerHTML = `
        <div class="day-empty">
          <div class="day-empty-icon">${type === 'inbound' ? '📦' : '🚚'}</div>
          <div>Nothing planned</div>
        </div>`;
    } else {
      bucket.items.forEach((item, itemIdx) => {
        cardsEl.appendChild(createCard(item, type, idx, itemIdx));
      });
    }
  });
}

function createCard(item, panelType, dayIdx, itemIdx) {
  const card = document.createElement('div');
  card.className = 'card';
  card.onclick = () => openModal(item, panelType);

  const badgeClass = getBadgeClass(item.type);
  const metaParts = [];
  if (item.pallets) metaParts.push(`<span>PLT <span class="num">${item.pallets}</span></span>`);
  if (item.pieces) metaParts.push(`<span>PCS <span class="num">${item.pieces}</span></span>`);
  if (item.truckId) metaParts.push(`<span>🚚 <span class="num">${item.truckId}</span></span>`);

  card.innerHTML = `
    <div class="card-top">
      <div class="card-vendor">${escHtml(item.vendor)}</div>
      <span class="card-type-badge ${badgeClass}">${escHtml(item.type)}</span>
    </div>
    ${metaParts.length ? `<div class="card-meta">${metaParts.join('')}</div>` : ''}
    ${item.venue ? `<div class="card-venue">→ ${escHtml(item.venue)}</div>` : ''}
  `;
  return card;
}

function getBadgeClass(type) {
  if (!type) return 'badge-other';
  const t = type.toLowerCase();
  if (t.includes('ff') || t.includes('e')) return 'badge-ffe';
  if (t.includes('cort')) return 'badge-cort';
  if (t.includes('freight')) return 'badge-freight';
  if (t.includes('truck')) return 'badge-truck';
  if (t.includes('dispatch') || t.includes('lm')) return 'badge-dispatch';
  if (t.includes('manual')) return 'badge-manual';
  return 'badge-other';
}

function renderKpis(type, dayBuckets) {
  const container = document.getElementById(type === 'inbound' ? 'inboundKpis' : 'outboundKpis');
  const allItems = dayBuckets.flatMap(b => b.items);

  const totalDeliveries = allItems.length;
  const totalPallets = allItems.reduce((s, i) => s + (i.pallets || 0), 0);
  const totalPieces = allItems.reduce((s, i) => s + (i.pieces || 0), 0);
  const uniqueVenues = new Set(allItems.map(i => i.venue).filter(Boolean)).size;

  container.innerHTML = `
    <div class="kpi-card">
      <div class="kpi-value">${totalDeliveries}</div>
      <div class="kpi-label">Planned ${type === 'inbound' ? 'Arrivals' : 'Dispatches'}</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-value">${totalPallets}</div>
      <div class="kpi-label">Pallets</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-value">${totalPieces}</div>
      <div class="kpi-label">Pieces</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-value">${uniqueVenues}</div>
      <div class="kpi-label">Venues</div>
    </div>
  `;
}

// ════════════════════════════════════════════════
// MODAL
// ════════════════════════════════════════════════
function openModal(item, panelType) {
  const overlay = document.getElementById('modalOverlay');
  const title = document.getElementById('modalTitle');
  const body = document.getElementById('modalBody');

  title.textContent = item.vendor;

  let html = `
    <div class="modal-kpi-row">
      <div class="modal-kpi"><div class="num">${item.pallets || '—'}</div><div class="label">Pallets</div></div>
      <div class="modal-kpi"><div class="num">${item.pieces || '—'}</div><div class="label">Pieces</div></div>
      <div class="modal-kpi"><div class="num">${item.type || '—'}</div><div class="label">Type</div></div>
      ${item.venue ? `<div class="modal-kpi"><div class="num" style="font-size:13px">${escHtml(item.venue)}</div><div class="label">Venue</div></div>` : ''}
    </div>
  `;

  if (item.materials && item.materials.length > 0) {
    html += `
      <table class="modal-table">
        <thead><tr><th>Material</th><th>Qty</th><th>Unit</th></tr></thead>
        <tbody>
          ${item.materials.map(m => `
            <tr>
              <td class="td-name">${escHtml(m.name)}</td>
              <td class="td-num">${m.qty}</td>
              <td>${escHtml(m.unit)}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
  } else {
    // Show raw data as fallback
    html += `
      <div style="font-size:11px;color:var(--text-muted);margin-top:8px;">
        <strong>Raw Data:</strong>
        <pre style="margin-top:6px;padding:10px;background:var(--bg);border-radius:6px;overflow:auto;max-height:200px;font-size:10px;line-height:1.4;">
${escHtml(JSON.stringify(item._raw, null, 2))}
        </pre>
      </div>
    `;
  }

  body.innerHTML = html;
  overlay.classList.add('active');
}

function closeModal(e) {
  if (e && e.target !== e.currentTarget) return;
  document.getElementById('modalOverlay').classList.remove('active');
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ════════════════════════════════════════════════
// REFRESH LOOP & CLOCK
// ════════════════════════════════════════════════
function startRefreshLoop() {
  setInterval(() => {
    refreshCountdown--;
    document.getElementById('refreshTimer').textContent = `Next refresh: ${refreshCountdown}s`;
    if (refreshCountdown <= 0) {
      refreshCountdown = REFRESH_INTERVAL;
      fetchAllData();
    }
  }, 1000);
}

function startClock() {
  const update = () => {
    document.getElementById('clockDisplay').textContent =
      new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  };
  update();
  setInterval(update, 1000);
}

function escHtml(s) {
  if (!s) return '';
  const el = document.createElement('span');
  el.textContent = String(s);
  return el.innerHTML;
}

// ── GO ──
init();
</script>
